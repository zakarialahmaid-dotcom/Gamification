<title>Jumia — Gardien de But</title>

<!-- ============================================================
     WEBVIEW SAFETY LAYER — Storage Polyfill + Global Error Boundary
     Must execute before any other script to protect against:
       · Blocked localStorage/sessionStorage in restricted Android WebViews
       · Silent uncaught JS exceptions that cause white-screen crashes
     ============================================================ -->
<script>
(function() {
  'use strict';

  /* ── 1. STORAGE POLYFILL ──────────────────────────────────
     Restricted Android WebViews (e.g. inside third-party apps)
     throw a SecurityError when any code touches window.localStorage
     or window.sessionStorage — even just reading the property.
     We probe each storage type with a real setItem() call inside
     try/catch, and swap in a plain in-memory object if it fails.
     The polyfill matches the Web Storage API surface exactly so
     all downstream code works without modification.
  ──────────────────────────────────────────────────────────── */
  function MemStorage() {
    var _s = {};
    return {
      get length() { return Object.keys(_s).length; },
      key: function(n) { return Object.keys(_s)[n] || null; },
      getItem: function(k) {
        return Object.prototype.hasOwnProperty.call(_s, k) ? _s[k] : null;
      },
      setItem:    function(k, v) { _s[String(k)] = String(v); },
      removeItem: function(k)    { delete _s[k]; },
      clear:      function()     { _s = {}; }
    };
  }

  ['localStorage', 'sessionStorage'].forEach(function(name) {
    try {
      /* A real write+delete test — property access alone isn't enough;
         some hosts expose the object but throw on mutation.           */
      window[name].setItem('__jg__', '1');
      window[name].removeItem('__jg__');
    } catch (e) {
      var poly = MemStorage();
      try {
        Object.defineProperty(window, name, {
          value: poly, writable: true, configurable: true
        });
      } catch (e2) {
        try { window[name] = poly; } catch (e3) { /* fully locked — ignore */ }
      }
      console.warn('[JumiaGame] ' + name + ' unavailable — using in-memory polyfill.');
    }
  });


  /* ── 2. GLOBAL ERROR BOUNDARY ────────────────────────────
     Catches any unhandled JS exception that would otherwise
     produce a completely silent white screen. Renders a
     branded fallback so users know what happened and how to
     proceed, while also logging diagnostic info to console.
  ──────────────────────────────────────────────────────────── */
  var _fallbackShown = false;

  function showFallback(msg, src, line) {
    if (_fallbackShown) return;
    _fallbackShown = true;

    /* Cancel any running rAF game loop */
    try { if (window.animId) cancelAnimationFrame(window.animId); } catch (e) {}

    var fallbackHTML = [
      '<div style="',
        'font-family:Arial,sans-serif;',
        'background:#ff9900;',
        'color:#fff;',
        'min-height:100vh;',
        'display:flex;',
        'flex-direction:column;',
        'align-items:center;',
        'justify-content:center;',
        'padding:32px 24px;',
        'text-align:center;',
        'box-sizing:border-box;',
      '">',
        '<div style="font-size:52px;margin-bottom:16px;">&#x26BD;</div>',
        '<div style="font-size:26px;font-weight:900;line-height:1.1;margin-bottom:12px;letter-spacing:-0.5px;">',
          'JUMIA<br>GARDIEN DE BUT',
        '</div>',
        '<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:16px 20px;',
          'font-size:14px;line-height:1.6;max-width:320px;margin-bottom:20px;">',
          '<strong>Ouvre ce jeu dans ton navigateur</strong><br>',
          'pour profiter de l\'exp&eacute;rience compl&egrave;te.<br><br>',
          '<span style="opacity:0.7;font-size:12px;">Chrome &middot; Firefox &middot; Safari</span>',
        '</div>',
        '<a href="https://www.jumia.ma" style="',
          'background:#ec2326;',
          'color:#fff;',
          'padding:14px 28px;',
          'border-radius:6px;',
          'font-weight:900;',
          'text-decoration:none;',
          'font-size:14px;',
          'letter-spacing:0.06em;',
          'box-shadow:0 4px 0 #a31a1d;',
        '">JUMIA.MA</a>',
        (msg
          ? '<div style="margin-top:20px;opacity:0.4;font-size:10px;word-break:break-all;max-width:320px;">'
            + 'ERR: ' + String(msg).substring(0, 140)
            + (src ? ' &nbsp;|&nbsp; ' + String(src).replace(/.*\//, '') + ':' + line : '')
            + '</div>'
          : ''),
      '</div>'
    ].join('');

    try {
      var appEl  = document.getElementById('app');
      var loadEl = document.getElementById('loading-screen');
      if (loadEl) loadEl.style.display = 'none';
      if (appEl) {
        appEl.innerHTML = fallbackHTML;
        appEl.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;z-index:999999;';
      } else {
        document.body.innerHTML = fallbackHTML;
        document.body.style.cssText = 'margin:0;padding:0;overflow-y:auto;';
      }
    } catch (domErr) {
      /* If even DOM writes fail we are in a totally broken environment */
      try { document.write(fallbackHTML); } catch (e) { /* nothing more we can do */ }
    }
  }

  /* Synchronous uncaught exceptions */
  window.onerror = function(msg, src, line, col, errObj) {
    var detail = (errObj && errObj.stack) ? errObj.stack : msg;
    console.error('[JumiaGame] Uncaught error:', detail, '\n  at', src, line + ':' + col);
    showFallback(msg, src, line);
    return true; /* suppress default browser error dialog */
  };

  /* Async / Promise rejections */
  window.addEventListener('unhandledrejection', function(evt) {
    var reason = evt.reason
      ? (evt.reason.message || String(evt.reason))
      : 'Unhandled Promise rejection';
    console.error('[JumiaGame] Unhandled rejection:', reason);
    /* Only escalate to full fallback if we are still on the loading screen
       (i.e. the game never successfully initialised).                       */
    var loadEl  = document.getElementById('loading-screen');
    var loading = loadEl
      && loadEl.style.display !== 'none'
      && !loadEl.classList.contains('fade-out');
    if (loading) showFallback(reason, '', '');
  });

})();
</script>
<!-- END WEBVIEW SAFETY LAYER -->
<style>
@font-face{font-family:'HelveticaDisplay';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-compressed-5871d14b6903a.otf') format('opentype');font-weight:900;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica.ttf') format('truetype');font-weight:500;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-light-587ebe5a59211.ttf') format('truetype');font-weight:300;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Gotham-Black.otf') format('opentype');font-weight:900;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/GothamBold.ttf') format('truetype');font-weight:700;}
:root{
  --c60:#ff9900;--c60d:#e68800;--c30:#ffffff;--c30t:rgba(255,255,255,0.12);
  --c30m:rgba(255,255,255,0.55);--c10:#ec2326;--c10d:#a31a1d;
  --ink:#403b3b;--ink2:#777;--yellow:#ffba00;--green:#22a651;
  --H1:'HelveticaDisplay','Gotham','Arial Black',Arial,sans-serif;
  --H2:'HelveticaText','Gotham',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{width:100%;height:100%;overflow:hidden;margin:0;padding:0;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
body{width:100%;height:100%;overflow:hidden;background:#1a2235;display:flex;align-items:stretch;justify-content:center;margin:0;padding:0;position:fixed;top:0;left:0;right:0;bottom:0;overscroll-behavior:none;touch-action:none;}
#app{width:100%;max-width:100%;height:100%;display:flex;flex-direction:column;background:var(--c60);overflow:hidden;font-family:var(--H1);position:relative;touch-action:none;}

/* LOADING */
#loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--c60);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s ease;}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.loading-logo{font-size:clamp(36px,12vw,52px);font-weight:900;color:var(--c30);font-family:var(--H1);line-height:.95;text-align:center;}
.loading-gloves-wrap{height:clamp(56px,15vw,72px);display:flex;align-items:center;justify-content:center;}
.loading-gloves{height:100%;width:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));}
.loading-sub{font-size:clamp(10px,2.8vw,13px);color:rgba(255,255,255,.6);font-family:var(--H2);text-transform:uppercase;letter-spacing:.1em;}
.loading-bar-wrap{width:clamp(160px,45vw,220px);height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
.loading-bar{height:100%;width:0%;background:var(--c30);border-radius:2px;transition:width .25s ease;}

/* ROTATE */
#rotate-screen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--c60);z-index:99998;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#rotate-screen.show{display:flex;}
.rotate-icon{font-size:56px;animation:rotatePulse 1.5s ease infinite;}
@keyframes rotatePulse{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-90deg);}}
.rotate-msg{font-size:clamp(16px,5vw,20px);font-weight:900;color:var(--c30);font-family:var(--H1);text-align:center;line-height:1.2;}
.rotate-sub{font-size:clamp(11px,3vw,13px);color:rgba(255,255,255,.7);font-family:var(--H2);text-align:center;}
@media (orientation:landscape) and (max-height:500px){body{display:none;}}

/* ANIMATIONS */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.7)}}
@keyframes shake{0%,100%{margin-left:0}20%{margin-left:-8px}40%{margin-left:8px}60%{margin-left:-5px}80%{margin-left:5px}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes screenFlash{0%,100%{background:#ff9900}40%{background:#c01010}70%{background:#d41515}}
@keyframes bigShake{0%,100%{margin-left:0}15%{margin-left:-14px}30%{margin-left:14px}45%{margin-left:-10px}60%{margin-left:10px}75%{margin-left:-6px}90%{margin-left:6px}}
@keyframes itemIn{0%{opacity:0;transform:scale(0.4)}100%{opacity:1;transform:scale(1)}}
@keyframes goldenSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
@keyframes dangerPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes arrowBounce{0%{transform:translateY(0);}100%{transform:translateY(10px);}}
@keyframes wipeIn{0%{transform:scaleY(0);border-radius:60% 60% 0 0/40px 40px 0 0;}65%{transform:scaleY(1.04);border-radius:4px 4px 0 0;}100%{transform:scaleY(1);border-radius:0;}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOBBY */
#screen-lobby{flex:1;display:flex;flex-direction:column;background:var(--c60);padding:0;overflow:hidden;animation:fadeIn .25s ease;}

/* Hero header — orange band with title + attempts badge */
.lb-hero{flex:0 0 auto;background:var(--c60);padding:clamp(14px,3.5vw,20px) clamp(16px,4vw,22px) clamp(10px,2.5vw,14px);display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;}
.lb-hero-left{flex:1;min-width:0;}
.lb-eyebrow{font-size:clamp(9px,2.4vw,11px);font-weight:700;letter-spacing:.13em;color:rgba(255,255,255,.85);font-family:var(--H2);text-transform:uppercase;margin-bottom:4px;}
.lb-title{font-size:clamp(38px,11vw,54px);font-weight:900;color:var(--c30);line-height:.88;font-family:var(--H1);letter-spacing:-.01em;text-transform:uppercase;}
.lb-hero-ball{position:absolute;right:clamp(80px,22vw,110px);bottom:clamp(-4px,0vw,0px);width:clamp(56px,16vw,76px);height:auto;pointer-events:none;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));}
.lb-attempts-badge{flex-shrink:0;background:#1a2235;border-radius:10px;padding:clamp(8px,2vw,12px) clamp(12px,3vw,16px);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:clamp(72px,18vw,88px);}
.lb-attempts-icon{font-size:clamp(14px,3.5vw,18px);margin-bottom:2px;display:block;}
.lb-attempts-num{font-size:clamp(26px,7.5vw,34px);font-weight:900;font-family:var(--H1);line-height:1;color:var(--c30);}
.lb-attempts-num.urgent{color:var(--c10);}
.lb-attempts-lbl{font-size:clamp(7px,1.8vw,9px);font-weight:700;color:#22a651;font-family:var(--H2);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

/* Scrollable content area */
.lb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,18px) 0;}
.lb-scroll::-webkit-scrollbar{display:none;}

/* Leaderboard card — dark navy */
.lb-board{border-radius:12px;overflow:hidden;background:#1a2235;box-shadow:0 4px 20px rgba(0,0,0,.25);margin-bottom:clamp(10px,2.5vw,14px);}
.lb-board-header{display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,2.5vw,13px) clamp(14px,3.5vw,18px);background:#1a2235;border-bottom:1px solid rgba(255,255,255,.07);}
.lb-board-header-left{display:flex;align-items:center;gap:8px;}
.lb-board-trophy{width:clamp(18px,4.5vw,22px);height:clamp(18px,4.5vw,22px);object-fit:contain;}
.lb-board-title{font-size:clamp(11px,3vw,14px);font-weight:900;color:var(--c30);font-family:var(--H1);letter-spacing:.08em;text-transform:uppercase;}
.lb-board-live{font-size:clamp(9px,2.3vw,11px);font-weight:700;color:var(--c30);font-family:var(--H2);display:flex;align-items:center;gap:5px;}
.lb-board-live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c10);display:inline-block;animation:dotPulse 1.4s ease infinite;}
.lb-board-rows{max-height:clamp(190px,52vw,240px);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.lb-board-rows::-webkit-scrollbar{width:3px;}
.lb-board-rows::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.lb-board-row{display:flex;align-items:center;padding:clamp(9px,2.3vw,12px) clamp(14px,3.5vw,18px);gap:10px;border-bottom:1px solid rgba(255,255,255,.05);}
.lb-board-row:last-child{border-bottom:none;}
.lb-rank{font-size:clamp(12px,3.2vw,15px);font-weight:900;width:24px;text-align:center;flex-shrink:0;color:rgba(255,255,255,.4);font-family:var(--H2);}
.lb-board-row.top1 .lb-rank{color:var(--c60);}
.lb-board-row.top3 .lb-rank{color:var(--c60);}
.lb-name{flex:1;font-size:clamp(13px,3.5vw,16px);font-weight:700;color:var(--c30);font-family:var(--H2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-score{font-size:clamp(12px,3.2vw,14px);font-weight:900;color:var(--c60);font-family:var(--H1);flex-shrink:0;}
.lb-prize{flex-shrink:0;font-size:clamp(9px,2.3vw,11px);font-weight:700;font-family:var(--H2);padding:3px 9px;border-radius:5px;white-space:nowrap;margin-left:4px;}
.lb-board-row.top1 .lb-prize{background:#fff3cc;color:#7a5c00;}
.lb-board-row.top2 .lb-prize{background:#e8e8e8;color:#444;}
.lb-board-row.top3 .lb-prize{background:#fde0c8;color:#7a3010;}
.lb-scroll-hint{text-align:center;padding:clamp(6px,1.5vw,8px);font-size:clamp(9px,2.3vw,11px);color:rgba(255,255,255,.35);font-family:var(--H2);border-top:1px solid rgba(255,255,255,.05);}
.lb-board-msg{text-align:center;padding:clamp(14px,3.5vw,18px);font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,.4);font-family:var(--H2);}

/* How-to-play section */
.lb-how{margin-bottom:clamp(10px,2.5vw,14px);}
.lb-how-header{display:flex;align-items:center;gap:8px;margin-bottom:clamp(8px,2vw,11px);}
.lb-how-header-icon{width:clamp(20px,5vw,24px);height:clamp(20px,5vw,24px);background:#1a2235;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.8vw,13px);flex-shrink:0;}
.lb-how-title{font-size:clamp(11px,3vw,13px);font-weight:900;color:var(--c30);font-family:var(--H1);text-transform:uppercase;letter-spacing:.1em;}
.lb-how-rows{display:flex;flex-direction:column;gap:clamp(8px,2vw,10px);}

/* Catch card — dark navy */
.lb-how-row{display:flex;align-items:center;gap:clamp(10px,2.5vw,14px);background:#1a2235;border-radius:10px;padding:clamp(12px,3vw,16px);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.lb-how-icon{flex-shrink:0;width:clamp(44px,11vw,54px);height:clamp(44px,11vw,54px);border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,153,0,.4);display:flex;align-items:center;justify-content:center;}
.lb-how-icon img{width:clamp(28px,7vw,34px);height:clamp(28px,7vw,34px);object-fit:contain;display:block;}
.lb-how-text{flex:1;min-width:0;}
.lb-how-action{font-size:clamp(13px,3.5vw,16px);font-weight:900;color:var(--c30);font-family:var(--H1);text-transform:uppercase;line-height:1.1;margin-bottom:3px;}
.lb-how-sub{font-size:clamp(10px,2.6vw,12px);color:rgba(255,255,255,.55);font-family:var(--H2);line-height:1.3;}
.lb-how-tag{flex-shrink:0;font-size:clamp(10px,2.6vw,12px);font-weight:900;font-family:var(--H1);padding:clamp(6px,1.5vw,8px) clamp(10px,2.5vw,14px);border-radius:6px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.lb-how-tag.green{background:#22a651;color:#fff;box-shadow:0 3px 0 #176e38;}
.lb-how-tag.red{background:var(--c10);color:#fff;box-shadow:0 3px 0 var(--c10d);}

/* Danger row */
.lb-how-row-danger{display:flex;align-items:center;gap:clamp(10px,2.5vw,14px);background:#1a2235;border-radius:10px;padding:clamp(12px,3vw,16px);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.lb-how-row-danger-icon{flex-shrink:0;width:clamp(44px,11vw,54px);height:clamp(44px,11vw,54px);border-radius:50%;background:rgba(236,35,38,.1);border:2px solid rgba(236,35,38,.35);display:flex;align-items:center;justify-content:center;}
.lb-how-row-danger-icon img{width:clamp(24px,6vw,30px);height:auto;object-fit:contain;display:block;}
.lb-how-row-danger-text{flex:1;min-width:0;}
.lb-how-row-danger-title{font-size:clamp(13px,3.5vw,16px);font-weight:900;color:var(--c30);font-family:var(--H1);text-transform:uppercase;line-height:1.1;margin-bottom:3px;}
.lb-how-row-danger-sub{font-size:clamp(10px,2.6vw,12px);color:rgba(255,255,255,.55);font-family:var(--H2);line-height:1.3;}
.lb-how-row-danger-tag{flex-shrink:0;}

/* CTA + spacer */
.lb-cta{flex:0 0 auto;padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,18px) clamp(8px,2vw,12px);}
.btn-kickoff{width:100%;background:#22a651;color:var(--c30);border:none;border-radius:10px;padding:clamp(16px,4.5vw,20px);font-size:clamp(16px,4.5vw,20px);font-weight:900;cursor:pointer;letter-spacing:.06em;font-family:var(--H1);text-transform:uppercase;box-shadow:0 5px 0 #176e38;transition:transform .1s,box-shadow .1s;display:flex;align-items:center;justify-content:center;gap:12px;}
.btn-kickoff:active{transform:translateY(5px);box-shadow:0 0 0 #176e38;}
.btn-kickoff:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-kickoff-icon{width:clamp(36px,9vw,44px);height:clamp(36px,9vw,44px);object-fit:contain;flex-shrink:0;}

/* Bottom nav */
.lb-nav{flex:0 0 auto;background:#1a2235;display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,.07);}
.lb-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(8px,2vw,11px) 4px clamp(10px,2.5vw,13px);gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:transparent;}
.lb-nav-icon{font-size:clamp(16px,4.3vw,20px);line-height:1;}
.lb-nav-label{font-size:clamp(8px,2vw,10px);font-weight:700;font-family:var(--H2);text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.35);}
.lb-nav-item.active .lb-nav-icon{color:var(--c60);}
.lb-nav-item.active .lb-nav-label{color:var(--c60);}

function musicFade(targetVol,duration=600){
  const start=music.volume,diff=targetVol-start,steps=30,interval=duration/steps;
  let step=0;
  const t=setInterval(()=>{step++;music.volume=Math.min(1,Math.max(0,start+diff*(step/steps)));if(step>=steps)clearInterval(t);},interval);
}
function startMusic(){if(!musicOn)return;if(!musicStarted){music.play().catch(()=>{});musicStarted=true;}musicFade(0.18);}
function stopMusic(){musicFade(0,600);setTimeout(()=>{music.pause();music.currentTime=0;},650);}

// TRANSITION
function goTo(fn){
  const t=$('play-transition');
  if(!t){fn();return;}
  t.style.animation='none';t.style.transform='scaleY(0)';void t.offsetWidth;t.style.animation='';
  t.classList.add('go');
  setTimeout(()=>{
    fn();
    setTimeout(()=>{
      t.style.transition='opacity .25s ease';t.style.opacity='0';
      setTimeout(()=>{t.classList.remove('go');t.style.animation='none';t.style.transform='scaleY(0)';t.style.opacity='1';t.style.transition='';},260);
    },60);
  },520);
}

// LEADERBOARD
async function fetchLeaderboard(){
  const tq=encodeURIComponent('SELECT B,E ORDER BY E DESC LIMIT 50');
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&tq=${tq}`;
  try{
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    if(!json.table?.rows)return[];
    return json.table.rows
      .filter(r=>r.c?.[1]?.v!=null)
      .map(r=>({name:String(r.c[0]?.v||'Joueur'),score:Number(String(r.c[1]?.v||0).replace(/[\s,]/g,''))||0}))
      .sort((a,b)=>b.score-a.score)
      .filter((p,i,arr)=>arr.findIndex(x=>x.name===p.name)===i)
      .slice(0,50);
  }catch(e){return[];}
}

// GAME LOOP
function tick(ts){
  if(done)return;
  if(tutorialActive){lastT=null;animId=requestAnimationFrame(tick);return;}
  if(!lastT)lastT=ts;
  const dt=Math.min((ts-lastT)/16,3);lastT=ts;
  const fw=getFW(),fh=getFH(),cy=CATCH_Y(fh);
  elapsedSec+=dt/60;
  speedVal=Math.min(6.0,1.1+elapsedSec*0.04);
  spawnInt=Math.max(520,2100-elapsedSec*24);
  const spd=7+elapsedSec*0.08;
  if(pressDir==='l')gloveX=Math.max(GW/2,gloveX-spd*dt);
  if(pressDir==='r')gloveX=Math.min(fw-GW/2,gloveX+spd*dt);
  const ge=$('glove-el');
  if(ge)ge.style.transform=`translateX(${gloveX-GW/2}px)`;
  if(ts-lastSpawn>spawnInt){
    const item=spawnItem(speedVal);itemsArr.push(item);lastSpawn=ts;addItemEl(item);
    if(elapsedSec>30&&Math.random()<0.38){
      setTimeout(()=>{if(done)return;const item2=spawnItem(speedVal*0.85);itemsArr.push(item2);addItemEl(item2);},350);
    }
  }
  let livesLost=0,ptsGained=0,newCombo=comboVal,closestRedDist=9999;
  itemsArr=itemsArr.filter(item=>{
    item.y+=item.speed*dt;
    const el=$('w-'+item.id);
    if(el)el.style.top=item.y+'px';
    const cx=item.x+item.width/2;
    const inGlove=cx>=gloveX-GW/2&&cx<=gloveX+GW/2;
    if(item.type==='redcard'){
      const distY=cy-item.y;
      if(distY>0&&distY<closestRedDist)closestRedDist=distY;
      if(distY<100&&el)el.classList.add('danger-close');
      else if(el)el.classList.remove('danger-close');
    }
    if(item.y+item.height*0.5>=cy&&item.y<cy+GH){
      if(inGlove){
        if(item.type==='ball'){
          newCombo++;
          const pts=Math.round((60+Math.floor(elapsedSec)*2)*Math.min(newCombo,5));
          ptsGained+=pts;
          showFlash(Math.min(Math.max(cx-30,0),fw-80),cy-44,'+'+pts+' GOAL!',true);
          triggerCatchRing(gloveX,cy);
          if(ge){ge.classList.add('catching');setTimeout(()=>ge&&ge.classList.remove('catching'),300);}
        } else if(item.type==='golden'){
          newCombo++;
          const pts=Math.round((200+Math.floor(elapsedSec)*4)*Math.min(newCombo,5));
          ptsGained+=pts;
          showFlash(Math.min(Math.max(cx-40,0),fw-100),cy-44,'★ +'+pts+' BONUS!',true);
          triggerCatchRing(gloveX,cy);
          if(ge){ge.classList.add('catching');setTimeout(()=>ge&&ge.classList.remove('catching'),300);}
        } else {
          // Red card — skip if within 180ms of button press (swipe protection)
          if(Date.now()-lastPressTime<180){if(el)el.remove();return false;}
          newCombo=0;livesLost++;
          showFlash(Math.min(Math.max(cx-40,0),fw-100),cy-50,'🟥 CARTON!',false);
          const sg=$('screen-game');
          if(sg){sg.classList.add('hit-flash');setTimeout(()=>sg&&sg.classList.remove('hit-flash'),400);}
          if(ge){ge.classList.remove('big-shake');void ge.offsetWidth;ge.classList.add('big-shake');setTimeout(()=>ge&&ge.classList.remove('big-shake'),500);}
        }
        if(el)el.remove();return false;
      }
    }
    if(item.y>fh+10){
      if(item.type==='redcard')ptsGained+=Math.round(10+elapsedSec*0.5);
      if(el)el.remove();return false;
    }
    return true;
  });
  const db=$('danger-bar'),dh=$('dodge-hint');
  if(db){
    if(closestRedDist<120){
      const intensity=Math.max(0,(120-closestRedDist)/120);
      db.style.height=(intensity*8)+'px';db.style.opacity=intensity;
      if(dh){dh.style.top=(cy-48-(intensity*12))+'px';dh.style.opacity=closestRedDist<60?'1':'0';}
    } else {db.style.height='0';db.style.opacity='0';if(dh)dh.style.opacity='0';}
  }
  comboVal=newCombo;
  if(newCombo>maxComboVal)maxComboVal=newCombo;
  if(ptsGained){scoreVal+=ptsGained;const sd=$('score-disp');if(sd)sd.textContent=scoreVal;}
  const cb=$('combo-badge');
  if(cb){cb.style.display=newCombo>1?'inline-block':'none';cb.textContent='×'+Math.min(newCombo,5)+' COMBO';}
  if(livesLost){livesVal=Math.max(0,livesVal-livesLost);updateLivesDisplay();if(livesVal<=0){endGame(scoreVal);return;}}
  animId=requestAnimationFrame(tick);
}

function addItemEl(item){
  const field=$('game-field');if(!field)return;
  const el=document.createElement('div');

  else if(item.type==='golden'){el.className='falling-item item-golden';el.innerHTML=`<img src="${IMG_GOLDEN}" alt="golden" draggable="false">`;}

  field.appendChild(el);
}

function triggerCatchRing(x,y){

}

function showFlash(x,y,text,good){

}

        <div class="fm-error-msg" id="err-email">E-mail valide requis</div>
      </div>
      <div class="fm-field" style="margin-bottom:0">
        <label class="fm-label" for="inp-city">Ville</label>
        <input class="fm-input" id="inp-city" type="text" placeholder="Ex : Casablanca" autocomplete="address-level2">
        <div class="fm-error-msg" id="err-city">Ville requise</div>
      </div>
    </div>
    <div class="fm-spacer"></div>
    <div style="padding:clamp(8px,2vw,12px) clamp(12px,3vw,18px) 0">
      <button class="btn-submit" id="btn-submit">
        <span id="submit-label">COUP D'ENVOI !</span>
        <div class="spinner" id="submit-spinner"></div>
      </button>
    </div>
    <div class="fm-legal">En soumettant ce formulaire, tu acceptes d'être contacté(e)<br>par Jumia. Tes données restent confidentielles.</div>
  </div>`;
  $('btn-submit').addEventListener('click',submitForm);
  $('inp-city').addEventListener('keydown',e=>{if(e.key==='Enter')submitForm();});
  ['inp-name','inp-email','inp-city'].forEach(id=>{
    const el=$(id);
    if(el)el.addEventListener('focus',()=>{setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),300);});
  });
}

function submitForm(){
  const name=$('inp-name')?.value.trim();
  const email=$('inp-email')?.value.trim();
  const city=$('inp-city')?.value.trim();
  let valid=true;
  const emailRe=new RegExp('^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$');
  [['inp-name','err-name',!name],['inp-email','err-email',!emailRe.test(email)],['inp-city','err-city',!city]].forEach(([inp,err,fail])=>{
    $(inp)?.classList.toggle('error',fail);
    const em=$(err);if(em)em.classList.toggle('visible',fail);if(fail)valid=false;
  });
  if(!valid)return;
  playerName=name;playerEmail=email;playerCity=city;
  const btn=$('btn-submit'),lbl=$('submit-label'),spn=$('submit-spinner');
  if(btn)btn.disabled=true;if(lbl)lbl.style.display='none';if(spn)spn.style.display='block';
  goTo(startGame);
}

// RESULT
function renderResult(){
  const v=getVoucher(scoreVal),s=scoreVal;
  $('app').innerHTML=`
  <div id="screen-result">
    <div class="rs-header">
      <div class="rs-brand">JUMIA — ÉDITION FANS</div>
      <div class="rs-title">${s>=400?'BIEN ARRÊTÉ !':'PRESQUE !'}</div>
      <div class="rs-sub">${s>=400?'Voici ton bon de réduction ↓':'Rejoue pour gagner un meilleur bon !'}</div>
    </div>
    <div class="rs-scores">
      ${[{val:s,lbl:"POINTS"},{val:'×'+Math.min(maxComboVal,5),lbl:"COMBO"},{val:Math.floor(elapsedSec)+'s',lbl:"SURVIE"}].map(sc=>`
        <div class="rs-score-card"><div class="rs-score-val">${sc.val}</div><div class="rs-score-lbl">${sc.lbl}</div></div>`).join('')}
    </div>
    <div class="voucher-card">
      <div class="v-eyebrow">TON BON DE RÉDUCTION</div>
      <div class="v-label" style="background:${v.bg}">${v.label}</div>
      <div class="v-disc-row">
        <img src="${IMG_VOUCHER}" style="width:48px;height:48px" alt="">
        <div class="v-disc">${v.disc}</div>
      </div>
      <div class="v-cat-line">sur toute la sélection football Jumia</div>
      <div class="v-code-row">
        <div class="v-code" id="coupon-code">${v.code}</div>
        <button class="btn-copy" id="btn-copy" onclick="copyCode('${v.code}',this)">COPIER</button>
      </div>
      <div class="v-note">Valable 7 jours · Sans montant minimum</div>
    </div>
    <div class="rs-cta-block">
      <button onclick="goTo(()=>{window.open('https://www.jumia.ma/mlp-foot-20253/','_blank');renderLobby();})" class="btn-jumia-main">
        <span>PROFITER DE L'OFFRE SUR JUMIA</span>
      </button>
      <div class="rs-url-hint">https://www.jumia.ma/mlp-foot-20253/</div>
    </div>
    <div class="rs-spacer"></div>
    <div class="rs-replay-bar">
      ${attempts>0
        ?`<button class="btn-replay-full" id="btn-replay">Rejouer (${attempts} tentative${attempts>1?'s':''} restante${attempts>1?'s':''})</button>`
        :`<div class="rs-no-attempts">Plus de tentatives aujourd'hui — reviens demain !</div>`}
    </div>
  </div>`;
  const br=$('btn-replay');
  if(br){
    let armed=false,timer=null;
    br.addEventListener('click',()=>{
      if(!armed){armed=true;br.textContent='Confirmer pour rejouer';br.classList.add('confirm');timer=setTimeout(()=>{armed=false;br.textContent=`Rejouer (${attempts} tentative${attempts>1?'s':''} restante${attempts>1?'s':''})`;br.classList.remove('confirm');},3000);}
      else{clearTimeout(timer);goTo(startGame);}
    });
  }
}

// PRELOADER
function preloadAssets(){
  const images=[IMG_STAR,IMG_TROPHY,IMG_VOUCHER,IMG_ATTEMPTS,IMG_GLOVES,IMG_SOCCER,IMG_GOLDEN,IMG_HEART,IMG_REDCARD,"https://raw.githubusercontent.com/Madzack69/Icons/main/Stadium.webp"];
  const bar=$('loading-bar'),sub=$('loading-sub'),gWrap=$('loading-gloves-wrap');
  const total=images.length+1;let loaded=0,finished=false;
  function tick(){
    loaded++;
    const pct=Math.round((loaded/total)*100);
    if(bar)bar.style.width=pct+'%';
    if(loaded>=5&&gWrap&&!gWrap.querySelector('img')){const g=new Image();g.className='loading-gloves';g.src=IMG_GLOVES;g.alt='';gWrap.appendChild(g);}
    if(loaded>=total&&!finished)finish();
  }
  function finish(){
    finished=true;
    if(sub)sub.textContent='Prêt !';
    if(bar)bar.style.width='100%';
    setTimeout(()=>{
      requestAnimationFrame(()=>{
        const screen=$('loading-screen');
        if(screen)screen.classList.add('fade-out');
        setTimeout(()=>{const s2=$('loading-screen');if(s2)s2.remove();renderLobby();},420);
      });
    },400);
  }
  images.forEach(src=>{const img=new Image();img.onload=tick;img.onerror=tick;img.src=src;});
  music.addEventListener('canplaythrough',tick,{once:true});
  music.addEventListener('error',tick,{once:true});
  music.load();
  setTimeout(()=>{if(!finished)finish();},8000);
}

preloadAssets();
</script>
