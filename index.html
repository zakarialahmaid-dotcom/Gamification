<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jumia — Gardien de But</title>
<style>
@font-face{font-family:'HelveticaDisplay';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-compressed-5871d14b6903a.otf') format('opentype');font-weight:900;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica.ttf') format('truetype');font-weight:500;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-light-587ebe5a59211.ttf') format('truetype');font-weight:300;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Gotham-Black.otf') format('opentype');font-weight:900;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/GothamBold.ttf') format('truetype');font-weight:700;}

:root{
  --c60:#ff9900;
  --c60d:#e68800;
  --c30:#ffffff;
  --c30t:rgba(255,255,255,0.12);
  --c30m:rgba(255,255,255,0.55);
  --c10:#ec2326;
  --c10d:#a31a1d;
  --ink:#403b3b;
  --ink2:#777;
  --yellow:#ffba00;
  --green:#22a651;
  --H1:'HelveticaDisplay','Gotham','Arial Black',Arial,sans-serif;
  --H2:'HelveticaText','Gotham',Arial,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html{
  width:100%;height:100%;
  overflow:hidden;margin:0;padding:0;
  /* Prevent iframe scroll on all browsers */
  overscroll-behavior:none;
  -webkit-overflow-scrolling:touch;
}
body{
  width:100%;height:100%;overflow:hidden;
  background:var(--c60);
  display:flex;align-items:stretch;justify-content:center;
  margin:0;padding:0;
  position:fixed;top:0;left:0;right:0;bottom:0;
  overscroll-behavior:none;
  touch-action:none;
}
#app{
  width:100%;max-width:100%;height:100%;
  display:flex;flex-direction:column;
  background:var(--c60);overflow:hidden;
  font-family:var(--H1);position:relative;
  touch-action:none;
}

/* ── LOADING SCREEN */
#loading-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--c60);z-index:99999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.loading-logo{
  font-size:clamp(36px,12vw,52px);font-weight:900;
  color:var(--c30);font-family:var(--H1);line-height:.95;text-align:center;
}
.loading-gloves-wrap{height:clamp(56px,15vw,72px);display:flex;align-items:center;justify-content:center;}
.loading-gloves{height:100%;width:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));}
.loading-sub{
  font-size:clamp(10px,2.8vw,13px);color:rgba(255,255,255,.6);
  font-family:var(--H2);text-transform:uppercase;letter-spacing:.1em;
}
.loading-bar-wrap{
  width:clamp(160px,45vw,220px);height:4px;
  background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;
}
.loading-bar{height:100%;width:0%;background:var(--c30);border-radius:2px;transition:width .25s ease;}

/* ── LANDSCAPE BLOCKER — shown when fullscreen rotates */
#rotate-screen{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--c60);
  z-index:99998;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
}
#rotate-screen.show{display:flex;}
.rotate-icon{
  font-size:56px;
  animation:rotatePulse 1.5s ease infinite;
}
@keyframes rotatePulse{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(-90deg);}
}
.rotate-msg{
  font-size:clamp(16px,5vw,20px);font-weight:900;
  color:var(--c30);font-family:var(--H1);
  text-align:center;line-height:1.2;
}
.rotate-sub{
  font-size:clamp(11px,3vw,13px);color:rgba(255,255,255,.7);
  font-family:var(--H2);text-align:center;
}

/* Force portrait layout always */
@media (orientation:landscape) and (max-height:500px){
  body{ display:none; }
}

/* ── ANIMATIONS */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.7)}}
@keyframes shake{0%,100%{margin-left:0}20%{margin-left:-8px}40%{margin-left:8px}60%{margin-left:-5px}80%{margin-left:5px}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes screenFlash{0%,100%{background:#ff9900}40%{background:#c01010}70%{background:#d41515}}
@keyframes bigShake{0%,100%{margin-left:0}15%{margin-left:-14px}30%{margin-left:14px}45%{margin-left:-10px}60%{margin-left:10px}75%{margin-left:-6px}90%{margin-left:6px}}
@keyframes heartBreak{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.7)}100%{transform:scale(.85)}}
@keyframes itemIn{0%{opacity:0;transform:scale(0.4)}100%{opacity:1;transform:scale(1)}}
@keyframes goldenSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
@keyframes dangerPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes ballSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes goalFlash{0%,100%{opacity:0}30%,70%{opacity:1}}

/* ══════════════════════════════════════════
   LOBBY — compact clean
══════════════════════════════════════════ */
#screen-lobby{
  flex:1;display:flex;flex-direction:column;
  background:var(--c60);padding:0;overflow:hidden;
  animation:fadeIn .25s ease;
}
/* Compact header — title left, attempts badge right */
.lb-top{
  flex:0 0 auto;
  padding:clamp(12px,3vw,18px) clamp(20px,5vw,28px) clamp(6px,1.5vw,10px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.lb-top-left{flex:1;}
.lb-eyebrow{
  font-size:clamp(9px,2.4vw,11px);font-weight:700;letter-spacing:.14em;
  color:rgba(255,255,255,.7);font-family:var(--H2);text-transform:uppercase;margin-bottom:2px;
}
.lb-title{
  font-size:clamp(28px,8.5vw,42px);font-weight:900;
  color:var(--c30);line-height:.92;font-family:var(--H1);letter-spacing:-.01em;
}
/* Attempts badge — top right */
.lb-attempts-badge{
  flex-shrink:0;background:var(--c30);border-radius:8px;
  padding:clamp(6px,1.5vw,10px) clamp(10px,2.5vw,14px);
  text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);
  min-width:clamp(56px,15vw,72px);
}
.lb-attempts-num{font-size:clamp(20px,6vw,28px);font-weight:900;font-family:var(--H1);line-height:1;}
.lb-attempts-num.urgent{color:var(--c10);}
.lb-attempts-num.ok{color:#22a651;}
.lb-attempts-lbl{font-size:clamp(7px,1.8vw,9px);font-weight:700;color:var(--ink2);font-family:var(--H2);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;}
/* Pitch divider */
.lb-pitch{
  flex:0 0 auto;
  margin:clamp(6px,1.5vw,8px) clamp(20px,5vw,28px) 0;
  height:2px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.3) 0,rgba(255,255,255,.3) 14px,transparent 14px,transparent 22px);
}
/* Leaderboard — scrollable */
.lb-board{
  flex:0 0 auto;
  margin:clamp(10px,2.5vw,14px) clamp(20px,5vw,28px) 0;
  border-radius:8px;overflow:hidden;
  background:var(--c30);box-shadow:0 2px 12px rgba(0,0,0,.1);
}
.lb-board-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(7px,1.8vw,9px) clamp(12px,3vw,16px);
  background:var(--c10);
}
.lb-board-title{font-size:clamp(10px,2.8vw,12px);font-weight:900;color:var(--c30);font-family:var(--H1);letter-spacing:.08em;}
.lb-board-live{font-size:clamp(8px,2vw,9px);font-weight:700;color:rgba(255,255,255,.75);font-family:var(--H2);display:flex;align-items:center;gap:4px;}
.lb-board-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:inline-block;animation:dotPulse 1.4s ease infinite;}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.lb-board-rows{
  max-height:clamp(130px,35vw,160px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:clamp(3px,1vw,4px) 0;
}
.lb-board-rows::-webkit-scrollbar{width:3px;}
.lb-board-rows::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
.lb-board-row{
  display:flex;align-items:center;
  padding:clamp(6px,1.6vw,8px) clamp(12px,3vw,16px);gap:8px;
  border-bottom:1px solid #f5f0e8;
}
.lb-board-row:last-child{border-bottom:none;}
.lb-board-row.top1{background:#fffbee;}
.lb-board-row.top2{background:#fafafa;}
.lb-board-row.top3{background:#fdf6ee;}
.lb-rank{font-size:clamp(11px,3vw,13px);font-weight:900;width:22px;text-align:center;flex-shrink:0;color:var(--ink2);font-family:var(--H2);}
.lb-board-row.top1 .lb-rank{color:var(--c60);}
.lb-name{flex:1;font-size:clamp(12px,3.2vw,14px);font-weight:700;color:var(--ink);font-family:var(--H2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-score{font-size:clamp(11px,3vw,13px);font-weight:900;color:var(--c10);font-family:var(--H1);flex-shrink:0;}
.lb-prize{
  flex-shrink:0;font-size:clamp(8px,2vw,9px);font-weight:700;font-family:var(--H2);
  padding:2px 7px;border-radius:4px;white-space:nowrap;margin-left:4px;
}
.lb-board-row.top1 .lb-prize{background:#fff3cc;color:#b8860b;}
.lb-board-row.top2 .lb-prize{background:#f0f0f0;color:#666;}
.lb-board-row.top3 .lb-prize{background:#fde8d8;color:#a0522d;}
.lb-scroll-hint{text-align:center;padding:3px;font-size:clamp(8px,2vw,9px);color:var(--ink2);font-family:var(--H2);background:#fafafa;border-top:1px solid #f0ece4;}
.lb-board-msg{text-align:center;padding:clamp(10px,2.5vw,14px);font-size:clamp(10px,2.6vw,12px);color:var(--ink2);font-family:var(--H2);}

/* ── TUTORIAL OVERLAY */
#tutorial-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.75);
  z-index:50;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:clamp(90px,24vw,120px);
  animation:fadeIn .3s ease;
}
.tuto-title{
  font-size:clamp(20px,6vw,26px);font-weight:900;
  color:#fff;font-family:var(--H1);text-transform:uppercase;
  text-align:center;line-height:1;margin-bottom:6px;
}
.tuto-sub{
  font-size:clamp(12px,3.2vw,14px);color:rgba(255,255,255,.8);
  font-family:var(--H2);line-height:1.4;text-align:center;
  padding:0 clamp(20px,5vw,28px);margin-bottom:clamp(16px,4vw,22px);
}
.tuto-pills{
  display:flex;gap:10px;justify-content:center;
  margin-bottom:clamp(24px,6vw,32px);
  padding:0 clamp(16px,4vw,24px);
}
.tuto-pill{
  display:flex;align-items:center;gap:8px;
  padding:clamp(8px,2vw,11px) clamp(12px,3vw,16px);
  border-radius:8px;
  font-size:clamp(11px,3vw,13px);font-weight:700;font-family:var(--H2);
}
.tuto-pill.catch{background:rgba(32,172,118,.95);color:#fff;}
.tuto-pill.dodge{background:rgba(236,35,38,.95);color:#fff;}
.tuto-pill img{width:clamp(24px,6.5vw,30px);height:clamp(24px,6.5vw,30px);object-fit:contain;flex-shrink:0;}
.tuto-arrows{
  display:flex;width:100%;justify-content:space-between;
  padding:0 clamp(30px,9vw,50px);
  margin-bottom:6px;
}
.tuto-arrow{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  animation:arrowBounce .65s ease infinite alternate;
}
.tuto-arrow:last-child{animation-delay:.2s;}
@keyframes arrowBounce{0%{transform:translateY(0);}100%{transform:translateY(10px);}}
.tuto-arrow-label{
  font-size:clamp(10px,2.8vw,12px);font-weight:900;
  color:#fff;font-family:var(--H1);text-transform:uppercase;
  text-shadow:0 2px 6px rgba(0,0,0,.5);
}
.tuto-arrow-icon{font-size:clamp(22px,6vw,28px);}
.tuto-tap{
  font-size:clamp(10px,2.8vw,12px);color:rgba(255,255,255,.55);
  font-family:var(--H2);text-align:center;
  padding:0 clamp(20px,5vw,28px);
}

/* ── BIG DANGER ROW */
.lb-how-row-danger{
  display:flex;align-items:center;gap:14px;
  background:var(--c10);
  border-radius:8px;
  padding:clamp(14px,3.5vw,18px);
  box-shadow:0 4px 14px rgba(236,35,38,.4);
  position:relative;overflow:hidden;
}
.lb-how-row-danger::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(45deg,rgba(0,0,0,.07) 0,rgba(0,0,0,.07) 6px,transparent 6px,transparent 14px);
  pointer-events:none;
}
.lb-how-row-danger-icon{
  width:clamp(38px,10vw,50px);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.5));
}
.lb-how-row-danger-icon img{
  width:clamp(28px,7vw,36px);
  height:auto;display:block;object-fit:contain;
}
.lb-how-row-danger-text{flex:1;}
.lb-how-row-danger-title{
  font-size:clamp(15px,4.2vw,19px);font-weight:900;
  color:var(--c30);font-family:var(--H1);
  text-transform:uppercase;line-height:1;margin-bottom:3px;
}
.lb-how-row-danger-sub{font-size:clamp(10px,2.6vw,12px);color:rgba(255,255,255,.8);font-family:var(--H2);}
.lb-how-row-danger-tag{
  flex-shrink:0;background:rgba(0,0,0,.25);color:var(--c30);
  font-size:clamp(9px,2.4vw,11px);font-weight:900;font-family:var(--H1);
  padding:5px 12px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;
  border:1.5px solid rgba(255,255,255,.3);
}

#play-transition{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--c10);z-index:9999;
  pointer-events:none;transform:scaleY(0);
  transform-origin:bottom center;
}
#play-transition.go{animation:wipeIn .55s cubic-bezier(.76,0,.24,1) forwards;}
@keyframes wipeIn{
  0%  {transform:scaleY(0);border-radius:60% 60% 0 0/40px 40px 0 0;}
  65% {transform:scaleY(1.04);border-radius:4px 4px 0 0;}
  100%{transform:scaleY(1);border-radius:0;}
}

/* ── HOW TO PLAY section */
.lb-how{
  flex:0 0 auto;
  margin:clamp(10px,2.5vw,14px) clamp(20px,5vw,28px) 0;
}
.lb-how-title{
  font-size:clamp(9px,2.4vw,11px);font-weight:700;
  color:rgba(255,255,255,.6);font-family:var(--H2);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:clamp(6px,1.5vw,8px);
}
.lb-how-rows{display:flex;flex-direction:column;gap:6px;}
.lb-how-row{
  display:flex;align-items:center;gap:12px;
  background:var(--c30);border-radius:8px;
  padding:clamp(10px,2.5vw,13px) clamp(14px,3.5vw,18px);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.lb-how-row.catch{border-left:4px solid #20ac76;}
.lb-how-row.bonus{border-left:4px solid var(--yellow);}
.lb-how-icon{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  width:clamp(32px,8vw,40px);height:clamp(32px,8vw,40px);
}
.lb-how-icon img{width:100%;height:100%;object-fit:contain;display:block;}
.lb-how-text{flex:1;}
.lb-how-action{
  font-size:clamp(12px,3.2vw,15px);font-weight:900;
  color:var(--ink);font-family:var(--H1);text-transform:uppercase;line-height:1;
}
.lb-how-desc{font-size:clamp(9px,2.4vw,11px);color:var(--ink2);font-family:var(--H2);margin-top:2px;}
.lb-how-tag{
  flex-shrink:0;font-size:clamp(9px,2.4vw,11px);font-weight:900;
  font-family:var(--H1);padding:4px 10px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.04em;
}
.lb-how-tag.green{background:#20ac76;color:#fff;}
.lb-how-tag.gold{background:var(--yellow);color:var(--ink);}
.lb-how-tag.red{background:var(--c10);color:#fff;}

.lb-spacer{flex:1;min-height:4px;max-height:24px;}

/* ── CTA — 10% Red, full-width, bold */
.lb-cta{
  flex:0 0 auto;
  padding:clamp(12px,3vw,20px) clamp(20px,5vw,28px) clamp(20px,5vw,32px);
}
/* Brand CTA: clear, direct, everyday language, black/white/red */
.btn-kickoff{
  width:100%;
  background:var(--c10);
  color:var(--c30);
  border:none;
  border-radius:6px;
  padding:clamp(16px,4.5vw,20px);
  font-size:clamp(15px,4.2vw,18px);
  font-weight:900;
  cursor:pointer;
  letter-spacing:.06em;
  font-family:var(--H1);
  text-transform:uppercase;
  /* Flat bold shadow — no gradients per brand */
  box-shadow:0 4px 0 var(--c10d);
  transition:transform .1s,box-shadow .1s;
}
.btn-kickoff:active{
  transform:translateY(4px);
  box-shadow:0 0 0 var(--c10d);
}
.btn-kickoff:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}
/* Body copy note: 25% of headline */
.cta-note{
  text-align:center;
  font-size:clamp(9px,2.5vw,11px);
  color:rgba(255,255,255,.5);
  margin-top:10px;
  font-family:var(--H2);
}

/* ══════════════════════════════════════════
   GAME
══════════════════════════════════════════ */
#screen-game{
  flex:1;display:flex;flex-direction:column;
  background:var(--c60);overflow:hidden;
  animation:fadeIn .15s ease;
}

/* ── Slim HUD — title only, no stats */
.gm-hud{
  flex:0 0 auto;
  background:var(--c30);
  padding:clamp(8px,2vw,11px) clamp(14px,4vw,22px);
  display:flex;align-items:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.gm-brand{display:flex;flex-direction:column;gap:3px;}
.gm-title{font-size:clamp(18px,5.5vw,26px);font-weight:900;color:var(--ink);line-height:1;}
.gm-tag{
  display:inline-flex;background:var(--c10);border-radius:4px;
  padding:2px 8px;width:fit-content;
}
.gm-tag span{font-size:clamp(8px,2vw,10px);font-weight:900;color:var(--c30);letter-spacing:.1em;}

/* ── Floating game overlay — top right inside field (McDonald's style) */
#game-overlay{
  position:absolute;
  top:clamp(12px,3vw,18px);
  right:clamp(10px,3vw,16px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(8px,2.5vw,12px);
  z-index:8;
}

/* Score circle */
.score-circle{
  width:clamp(56px,15vw,70px);height:clamp(56px,15vw,70px);
  background:var(--yellow);border-radius:50%;
  border:3px solid rgba(255,255,255,.7);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.2);
  flex-shrink:0;
}
.score-num{font-size:clamp(16px,5vw,22px);font-weight:900;color:var(--ink);line-height:1;}
.score-lbl{font-size:7px;font-weight:700;color:var(--ink);font-family:var(--H2);letter-spacing:.04em;}

/* Heart with counter — McDonald's style */
#lives-counter{
  position:relative;
  width:clamp(48px,13vw,60px);
  height:clamp(48px,13vw,60px);
  display:flex;align-items:center;justify-content:center;
}
#lives-counter img{

<body>
<div id="app"></div>
<div id="play-transition"></div>
<div id="loading-screen">
  <div class="loading-logo">GARDIEN<br>DE BUT</div>
  <div class="loading-gloves-wrap" id="loading-gloves-wrap"></div>
  <div class="loading-sub" id="loading-sub">Chargement en cours...</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>

<script>
const H1="'HelveticaDisplay','Gotham','Arial Black',Arial,sans-serif";
const H2="'HelveticaText','Gotham',Arial,sans-serif";

// ── DIMENSIONS
function getFW(){ return document.getElementById('app').offsetWidth||window.innerWidth||390; }
function getFH(){ return document.getElementById('game-field')?.offsetHeight||320; }

// Glove catcher size
const GW=90, GH=52;
function CATCH_Y(fh){ return fh - GH - 6; }

// Item sizes
const BALL_SIZE = 46;
const CARD_W = 68, CARD_H = 92;

const IMG_STAR    = "https://raw.githubusercontent.com/Madzack69/Icons/main/Star.png";
const IMG_TROPHY  = "https://raw.githubusercontent.com/Madzack69/Icons/main/Trophy.png";
const IMG_VOUCHER = "https://raw.githubusercontent.com/Madzack69/Icons/main/Voucher.png";
const IMG_ATTEMPTS= "https://raw.githubusercontent.com/Madzack69/Icons/main/Attempts.png";
const IMG_GLOVES  = "https://raw.githubusercontent.com/Madzack69/Icons/main/Gloves.png";
const IMG_SOCCER  = "https://raw.githubusercontent.com/Madzack69/Icons/main/Soccer.png";
const IMG_GOLDEN  = "https://raw.githubusercontent.com/Madzack69/Icons/main/Ballon%20d'or.png";
const IMG_HEART   = "https://raw.githubusercontent.com/Madzack69/Icons/main/Life.png";
const IMG_REDCARD = "https://raw.githubusercontent.com/Madzack69/Icons/main/Red.png";

// ── ITEM TYPES
// 'ball'    ⚽ — catch for points
// 'golden'  🌟 — catch for big bonus
// 'redcard' 🟥 — dodge or lose life

function getVoucher(s){
  if(s>=800) return{disc:"20% DE RÉD.",code:"JMLEGENDE20",label:"LÉGENDE",bg:"#ec2326"};
  if(s>=400) return{disc:"15% DE RÉD.",code:"JMCHAMP15",label:"CHAMPION",bg:"#633185"};
  if(s>=150) return{disc:"10% DE RÉD.",code:"JMMATCH10",label:"MATCH READY",bg:"#ff9900"};
  return          {disc:"5% DE RÉD.", code:"JMSTART5",label:"DÉBUTANT",bg:"#403b3b"};
}

function spawnItem(speed){
  const rand = Math.random();
  let type, w, h;
  if(rand < 0.08){
    type='golden'; w=BALL_SIZE; h=BALL_SIZE;       // 8% golden ball
  } else if(rand < 0.36){
    type='ball';   w=BALL_SIZE; h=BALL_SIZE;       // 28% soccer ball
  } else {
    type='redcard'; w=CARD_W; h=CARD_H;            // 64% red card
  }
  const fw = getFW();
  return {
    id: wid++, type,
    x: Math.random() * Math.max(8, fw - w - 14) + 4,
    y: -h - 4,
    speed, width: w, height: h
  };
}

// ── COPY TO CLIPBOARD — works in iframe, HTTP and HTTPS
function copyCode(text, btn){
  const success = () => {
    btn.textContent='✓ COPIÉ';
    btn.style.background='#22a651';
    btn.style.color='#fff';
    btn.style.boxShadow='0 3px 0 #176e38';
    btn.disabled=true;
    btn.style.cursor='default';
    btn.style.opacity='1';
  };
  // Try modern API first
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(success).catch(()=>fallback());
  } else {
    fallback();
  }
  function fallback(){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try{ document.execCommand('copy'); success(); }
    catch(e){ btn.textContent='Code: '+text; }
    document.body.removeChild(ta);
  }
}

// ── ORIENTATION DETECTION — show rotate screen in landscape
function checkOrientation(){
  const isLandscape = window.innerWidth > window.innerHeight;
  const rotate = document.getElementById('rotate-screen');
  if(rotate){
    rotate.classList.toggle('show', isLandscape);
  }
  // Try to lock portrait if Fullscreen API + Orientation API available
  if(document.fullscreenElement && screen.orientation?.lock){
    screen.orientation.lock('portrait').catch(()=>{});
  }
}
window.addEventListener('resize',             checkOrientation);
window.addEventListener('orientationchange',  checkOrientation);
document.addEventListener('fullscreenchange', checkOrientation);
checkOrientation();

// ── MUSIC SYSTEM
const MUSIC_URL = "https://raw.githubusercontent.com/zakarialahmaid-dotcom/Gamification/main/Football_game.mp3";
const music = new Audio(MUSIC_URL);
music.loop    = true;
music.volume  = 0;
let musicOn   = true;
let musicStarted = false;

function musicFade(targetVol, duration=600){
  const start   = music.volume;
  const diff    = targetVol - start;
  const steps   = 30;
  const interval = duration / steps;
  let  step     = 0;
  const t = setInterval(()=>{
    step++;
    music.volume = Math.min(1, Math.max(0, start + diff * (step/steps)));
    if(step >= steps) clearInterval(t);
  }, interval);
}

function startMusic(){
  if(!musicOn) return;
  if(!musicStarted){
    music.play().catch(()=>{});
    musicStarted = true;
  }
  musicFade(0.18);
}

function stopMusic(){
  musicFade(0, 600);
  setTimeout(()=>{
    music.pause();
    music.currentTime = 0;
  }, 650);
}

function toggleMusic(btn){
  musicOn = !musicOn;
  if(musicOn){
    music.play().catch(()=>{});
    musicFade(0.18);
    btn.textContent = '♪';
    btn.title = 'Couper la musique';
  } else {
    musicFade(0, 400);
    setTimeout(()=>music.pause(), 450);
    btn.textContent = '♪̶';
    btn.title = 'Activer la musique';
  }
}

// ── GLOBAL SCREEN TRANSITION — same red wipe for every phase
function goTo(fn){
  const t = document.getElementById('play-transition');
  if(!t){ fn(); return; }
  // Reset animation
  t.style.animation = 'none';
  t.style.transform = 'scaleY(0)';
  void t.offsetWidth; // reflow
  t.style.animation = '';
  t.classList.add('go');
  setTimeout(()=>{
    fn();
    // Fade out after screen renders
    setTimeout(()=>{
      t.style.transition = 'opacity .25s ease';
      t.style.opacity = '0';
      setTimeout(()=>{
        t.classList.remove('go');
        t.style.animation = 'none';
        t.style.transform = 'scaleY(0)';
        t.style.opacity = '1';
        t.style.transition = '';
      }, 260);
    }, 60);
  }, 520);
}

// ── LEADERBOARD FETCH
async function fetchLeaderboard(){
  // Use tq query to sort server-side AND limit rows — faster and more reliable
  const tq  = encodeURIComponent(`SELECT B,E ORDER BY E DESC LIMIT 50`);
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&tq=${tq}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    if(!json.table?.rows) return [];
    return json.table.rows
      .filter(r => r.c?.[1]?.v != null)
      .map(r => ({
        name:  String(r.c[0]?.v || 'Joueur'),
        // Parse score robustly — handles "5 818", "5,818", 5818
        score: Number(String(r.c[1]?.v || 0).replace(/[\s,]/g,'')) || 0
      }))
      .sort((a,b) => b.score - a.score)
      .filter((p,i,arr) => arr.findIndex(x => x.name === p.name) === i)
      .slice(0, 50);
  } catch(e){ return []; }
}

// ── GAME LOOP
function tick(ts){
  if(done) return;
  // Pause everything while tutorial is showing
  if(tutorialActive){ lastT=null; animId=requestAnimationFrame(tick); return; }
  if(!lastT) lastT=ts;
  const dt=Math.min((ts-lastT)/16,3); lastT=ts;
  const fw=getFW(), fh=getFH(), cy=CATCH_Y(fh);

  elapsedSec += dt/60;
  speedVal = Math.min(6.0, 1.1 + elapsedSec*0.04);
  spawnInt = Math.max(520, 2100 - elapsedSec*24);

  // Move gloves
  const spd = 7 + elapsedSec*0.08;
  if(pressDir==='l') gloveX=Math.max(GW/2, gloveX-spd*dt);
  if(pressDir==='r') gloveX=Math.min(fw-GW/2, gloveX+spd*dt);
  const ge=$('glove-el');
  if(ge) ge.style.transform=`translateX(${gloveX-GW/2}px)`;

  // Spawn items
  if(ts-lastSpawn > spawnInt){
    const item=spawnItem(speedVal);
    itemsArr.push(item); lastSpawn=ts;
    addItemEl(item);
    // Double spawn chaos after 30s
    if(elapsedSec>30 && Math.random()<0.38){
      setTimeout(()=>{
        if(done) return;
        const item2=spawnItem(speedVal*0.85);
        itemsArr.push(item2); addItemEl(item2);
      },350);
    }
  }

  let livesLost=0, ptsGained=0, newCombo=comboVal;
  let closestRedDist=9999;

  itemsArr = itemsArr.filter(item=>{
    item.y += item.speed*dt;
    const el=$('w-'+item.id);
    if(el) el.style.top=item.y+'px';

    const cx = item.x + item.width/2;
    const inGlove = cx >= gloveX-GW/2 && cx <= gloveX+GW/2;

    // Track closest red card for danger
    if(item.type==='redcard'){
      const distY = cy - item.y;
      if(distY>0 && distY<closestRedDist) closestRedDist=distY;
      if(distY<100 && el) el.classList.add('danger-close');
      else if(el) el.classList.remove('danger-close');
    }

    // Catch zone
    if(item.y+item.height*0.5 >= cy && item.y < cy+GH){
      if(inGlove){
        if(item.type==='ball'){
          newCombo++;
          const pts = Math.round((60+Math.floor(elapsedSec)*2) * Math.min(newCombo,5));
          ptsGained += pts;
          showFlash(Math.min(Math.max(cx-30,0),fw-80), cy-44, '+'+pts+' GOAL!', true);
          triggerCatchRing(gloveX, cy);
          if(ge){ ge.classList.add('catching'); setTimeout(()=>ge&&ge.classList.remove('catching'),300); }
        } else if(item.type==='golden'){
          newCombo++;
          const pts = Math.round((200+Math.floor(elapsedSec)*4) * Math.min(newCombo,5));
          ptsGained += pts;
          showFlash(Math.min(Math.max(cx-40,0),fw-100), cy-44, '★ +'+pts+' BONUS!', true);
          triggerCatchRing(gloveX, cy);
          if(ge){ ge.classList.add('catching'); setTimeout(()=>ge&&ge.classList.remove('catching'),300); }
        } else {
          // Red card hit — skip if within 180ms of button press (swipe protection)
          if(Date.now() - lastPressTime < 180) {
            if(el) el.remove();
            return false;
          }
          newCombo=0; livesLost++;
          showFlash(Math.min(Math.max(cx-40,0),fw-100), cy-50, '🟥 CARTON!', false);
          const sg=$('screen-game');
          if(sg){ sg.classList.add('hit-flash'); setTimeout(()=>sg&&sg.classList.remove('hit-flash'),400); }
          if(ge){ ge.classList.remove('big-shake'); void ge.offsetWidth; ge.classList.add('big-shake'); setTimeout(()=>ge&&ge.classList.remove('big-shake'),500); }
        }
        if(el) el.remove();
        return false;
      }
    }

    // Item exits bottom
    if(item.y > fh+10){
      // Dodging red cards = survival points
      if(item.type==='redcard'){
        ptsGained += Math.round(10 + elapsedSec*0.5);
      }
      if(el) el.remove();
      return false;
    }
    return true;
  });

  // Danger bar
  const db=$('danger-bar'), dh=$('dodge-hint');
  if(db){
    if(closestRedDist<120){
      const intensity=Math.max(0,(120-closestRedDist)/120);
      db.style.height=(intensity*8)+'px'; db.style.opacity=intensity;
      if(dh){ dh.style.top=(cy-48-(intensity*12))+'px'; dh.style.opacity=closestRedDist<60?'1':'0'; }
    } else {
      db.style.height='0'; db.style.opacity='0';
      if(dh) dh.style.opacity='0';
    }
  }

  comboVal=newCombo;
  if(newCombo > maxComboVal) maxComboVal=newCombo;
  if(ptsGained){ scoreVal+=ptsGained; const sd=$('score-disp'); if(sd) sd.textContent=scoreVal; }
  const cb=$('combo-badge');
  if(cb){ cb.style.display=newCombo>1?'inline-block':'none'; cb.textContent='×'+Math.min(newCombo,5)+' COMBO'; }

  if(livesLost){
    livesVal=Math.max(0,livesVal-livesLost);
    updateLivesDisplay();
    if(livesVal<=0){ endGame(scoreVal); return; }
  }
  animId=requestAnimationFrame(tick);
}

function addItemEl(item){
  const field=$('game-field'); if(!field) return;
  const el=document.createElement('div');
  el.id='w-'+item.id;
  el.style.left=item.x+'px';
  el.style.top=item.y+'px';

  if(item.type==='ball'){
    el.className='falling-item item-ball';
    el.innerHTML=`<img src="${IMG_SOCCER}" alt="ball" draggable="false">`;
  } else if(item.type==='golden'){
    el.className='falling-item item-golden';
    el.innerHTML=`<img src="${IMG_GOLDEN}" alt="golden" draggable="false">`;
  } else {
    el.className='falling-item item-redcard';
    el.style.width=item.width+'px';
    el.style.height=item.height+'px';
    el.innerHTML=`<img src="${IMG_REDCARD}" alt="red card" draggable="false">`;
  }
  field.appendChild(el);
}

function triggerCatchRing(x, y){
  const ring=$('catch-ring'); if(!ring) return;
  ring.style.left=(x-30)+'px';
  ring.style.top=(y-30)+'px';
  ring.style.width='60px'; ring.style.height='60px';
  ring.classList.remove('pop');
  void ring.offsetWidth;
  ring.classList.add('pop');
  setTimeout(()=>ring&&ring.classList.remove('pop'),320);
}

function showFlash(x,y,text,good){
  const field=$('game-field'); if(!field) return;
  const el=document.createElement('div');
  el.className='flash-msg';
  el.textContent=text;
  el.style.cssText=`left:${x}px;top:${y}px;background:${good?'#ffba00':'#ec2326'};color:${good?'#403b3b':'#fff'};`;
  field.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function endGame(finalScore){
  if(done) return; done=true;
  cancelAnimationFrame(animId);
  stopMusic();
  if(finalScore>=150) vWon++;
  totalPts+=finalScore; scoreVal=finalScore;
  attempts=Math.max(0,attempts-1);
  if(finalScore > bestScore) bestScore=finalScore;
  hasPlayedOnce=true;

  // Send complete entry in one shot — credentials + final score together
  if(SHEET_URL.startsWith("https://") && playerName){
    const params=new URLSearchParams({
      timestamp: new Date().toISOString(),
      name:      playerName,
      email:     playerEmail,
      city:      playerCity,
      score:     finalScore,
      combo:     Math.min(maxComboVal,5),
      survie:    Math.floor(elapsedSec),
      voucher:   getVoucher(finalScore).code,
      source:    'JumiaGardienDeBut'
    });
    fetch(SHEET_URL+'?'+params.toString(),{method:'GET',mode:'no-cors'}).catch(()=>{});
  }
  goTo(renderResult);
}

// ── FORM
function renderForm(){
  startMusic();
  $('app').innerHTML=`
  <div id="screen-form">
    <div class="fm-top">
      <span class="fm-emoji" style="display:block;margin-bottom:8px"><img src="${IMG_GLOVES}" style="height:clamp(48px,13vw,64px);width:auto;display:inline-block" alt="gloves"></span>
      <div class="fm-title">PRÊT(E) À JOUER ?</div>
      <div class="fm-sub">Saisis tes infos pour<br><b>participer et gagner ton bon Jumia</b></div>
    </div>
    <div class="fm-card">
      <div class="fm-field">
        <label class="fm-label" for="inp-name">Prénom</label>
        <input class="fm-input" id="inp-name" type="text" placeholder="Ex : Yasmine" autocomplete="given-name">
        <div class="fm-error-msg" id="err-name">Prénom requis</div>
      </div>
      <div class="fm-field">
        <label class="fm-label" for="inp-email">Adresse e-mail</label>
        <input class="fm-input" id="inp-email" type="email" placeholder="Ex : yasmine@email.com" autocomplete="email">
        <div class="fm-error-msg" id="err-email">E-mail valide requis</div>
      </div>
      <div class="fm-field" style="margin-bottom:0">
        <label class="fm-label" for="inp-city">Ville</label>
        <input class="fm-input" id="inp-city" type="text" placeholder="Ex : Casablanca" autocomplete="address-level2">
        <div class="fm-error-msg" id="err-city">Ville requise</div>
      </div>
    </div>
    <div class="fm-spacer"></div>
    <div style="padding:clamp(8px,2vw,12px) clamp(12px,3vw,18px) 0">
      <button class="btn-submit" id="btn-submit">
        <span id="submit-label">COUP D'ENVOI !</span>
        <div class="spinner" id="submit-spinner"></div>
      </button>
    </div>
    <div class="fm-legal">
      En soumettant ce formulaire, tu acceptes d'être contacté(e)<br>
      par Jumia. Tes données restent confidentielles.
    </div>
  </div>`;
  $('btn-submit').addEventListener('click', submitForm);
  $('inp-city').addEventListener('keydown', e=>{ if(e.key==='Enter') submitForm(); });
  // iOS: scroll focused input above keyboard
  ['inp-name','inp-email','inp-city'].forEach(id=>{
    const el=$(id);
    if(el) el.addEventListener('focus',()=>{
      setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),300);
    });
  });
}

function submitForm(){
  const name=$('inp-name')?.value.trim();
  const email=$('inp-email')?.value.trim();
  const city=$('inp-city')?.value.trim();
  let valid=true;
  const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  [['inp-name','err-name',!name],
   ['inp-email','err-email',!emailRe.test(email)],
   ['inp-city','err-city',!city]
  ].forEach(([inp,err,fail])=>{
    $(inp)?.classList.toggle('error',fail);
    const em=$(err); if(em) em.classList.toggle('visible',fail);
    if(fail) valid=false;
  });
  if(!valid) return;

  // Store credentials — sheet is called after game ends with real score
  playerName=name; playerEmail=email; playerCity=city;

  const btn=$('btn-submit'), lbl=$('submit-label'), spn=$('submit-spinner');
  if(btn) btn.disabled=true;
  if(lbl) lbl.style.display='none';
  if(spn) spn.style.display='block';

  goTo(startGame);
}

        <div class="v-disc">${v.disc}</div>
      </div>
      <div class="v-cat-line">sur toute la sélection football Jumia</div>
      <div class="v-code-row">
        <div class="v-code" id="coupon-code" style="font-family:${H1}">${v.code}</div>
        <button class="btn-copy" id="btn-copy" onclick="copyCode('${v.code}',this)">COPIER</button>
      </div>
      <div class="v-note">Valable 7 jours · Sans montant minimum</div>
    </div>
    <div class="rs-cta-block">
      <button onclick="goTo(()=>{ window.open('https://www.jumia.ma/mlp-foot-20253/','_blank'); renderLobby(); })" class="btn-jumia-main">
        <span>PROFITER DE L'OFFRE SUR JUMIA</span>
      </button>
      <div class="rs-url-hint">https://www.jumia.ma/mlp-foot-20253/</div>
    </div>
    <div class="rs-spacer"></div>

    <div class="rs-replay-bar">
      ${attempts>0
        ?`<button class="btn-replay-full" id="btn-replay">Rejouer (${attempts} tentative${attempts>1?'s':''} restante${attempts>1?'s':''})</button>`
        :`<div class="rs-no-attempts">Plus de tentatives aujourd'hui — reviens demain !</div>`
      }
    </div>
  </div>`;
  const br=$('btn-replay');
  if(br){
    let armed=false, timer=null;
    br.addEventListener('click',()=>{
      if(!armed){
        armed=true;
        br.textContent='Confirmer pour rejouer';
        br.classList.add('confirm');
        timer=setTimeout(()=>{
          armed=false;
          br.textContent=`Rejouer (${attempts} tentative${attempts>1?'s':''} restante${attempts>1?'s':''})`;
          br.classList.remove('confirm');
        },3000);
      } else {
        clearTimeout(timer);
        goTo(startGame);
      }
    });
  }
}


// ── ASSET PRELOADER
function preloadAssets(){
  const images = [
    IMG_STAR, IMG_TROPHY, IMG_VOUCHER, IMG_ATTEMPTS,
    IMG_GLOVES, IMG_SOCCER, IMG_GOLDEN, IMG_HEART, IMG_REDCARD,
    "https://raw.githubusercontent.com/Madzack69/Icons/main/Terrain_BG_Resized.png"
  ];

  const bar   = document.getElementById('loading-bar');
  const sub   = document.getElementById('loading-sub');
  const gWrap = document.getElementById('loading-gloves-wrap');
  const total = images.length + 1; // +1 for audio
  let loaded  = 0;
  let finished = false;

  function tick(){
    loaded++;
    const pct = Math.round((loaded / total) * 100);
    if(bar) bar.style.width = pct + '%';
    // Show gloves once their image is cached (IMG_GLOVES is index 4)
    if(loaded >= 5 && gWrap && !gWrap.querySelector('img')){
      const g = new Image();
      g.className = 'loading-gloves';
      g.src = IMG_GLOVES;
      g.alt = '';
      gWrap.appendChild(g);
    }
    if(loaded >= total && !finished) finish();
  }

  function finish(){
    finished = true;
    if(sub) sub.textContent = 'Prêt !';
    if(bar) bar.style.width = '100%';
    // Wait for a full paint cycle before transitioning
    setTimeout(()=>{
      requestAnimationFrame(()=>{
        const screen = document.getElementById('loading-screen');
        if(screen) screen.classList.add('fade-out');
        setTimeout(()=>{
          const screen2 = document.getElementById('loading-screen');
          if(screen2) screen2.remove();
          renderLobby();
        }, 420);
      });
    }, 400);
  }

  // Preload all images
  images.forEach(src => {
    const img = new Image();
    img.onload  = tick;
    img.onerror = tick;
    img.src = src;
  });

  // Preload audio
  music.addEventListener('canplaythrough', tick, { once:true });
  music.addEventListener('error', tick, { once:true });
  music.load();

  // Safety — show game after 8s regardless
  setTimeout(()=>{
    if(!finished) finish();
  }, 8000);
}

preloadAssets();
</script>
