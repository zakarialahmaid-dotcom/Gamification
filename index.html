<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jumia — Attrape-Mots</title>
<style>
/* ── FONTS */
@font-face{font-family:'HelveticaDisplay';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-compressed-5871d14b6903a.otf') format('opentype');font-weight:900;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Helvetica.ttf') format('truetype');font-weight:500;}
@font-face{font-family:'HelveticaText';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/helvetica-light-587ebe5a59211.ttf') format('truetype');font-weight:300;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/Gotham-Black.otf') format('opentype');font-weight:900;}
@font-face{font-family:'Gotham';src:url('https://raw.githubusercontent.com/Madzack69/Fonts/main/GothamBold.ttf') format('truetype');font-weight:700;}

/* ────────────────────────────────────────────────
   60 / 30 / 10 COLOUR SYSTEM
   60% → #ff9900  Orange    — dominant background
   30% → #ffffff  White     — surfaces, cards, text
   10% → #ec2326  Red       — CTAs, accents, badges
────────────────────────────────────────────────── */
:root{
  --c60:#ff9900;   /* orange — 60% dominant */
  --c60d:#e68800;  /* orange dark variant    */
  --c30:#ffffff;   /* white  — 30% secondary */
  --c30t:rgba(255,255,255,0.12); /* white tint */
  --c30m:rgba(255,255,255,0.55); /* white mid  */
  --c10:#ec2326;   /* red    — 10% accent    */
  --c10d:#a31a1d;  /* red dark               */
  --ink:#403b3b;   /* text on white          */
  --ink2:#777;
  --yellow:#ffba00;
  --green:#22a651;
  --H1:'HelveticaDisplay','Gotham','Arial Black',Arial,sans-serif;
  --H2:'HelveticaText','Gotham',Arial,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

/* FULL SCREEN — works standalone AND inside iframe */
html{width:100%;height:100%;overflow:hidden;}
body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--c60);
  display:flex;align-items:stretch;justify-content:center;
  margin:0;padding:0;
}
#app{
  width:100%;max-width:100%;
  height:100%;
  display:flex;flex-direction:column;
  background:var(--c60);
  overflow:hidden;
  font-family:var(--H1);
  position:relative;
}

/* ── ANIMATIONS */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes lvlPop{0%{opacity:0;transform:scale(0.4)}60%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1)}}
@keyframes wordIn{0%{opacity:0;transform:scaleY(0.5)}100%{opacity:1;transform:scaleY(1)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes screenFlash{0%,100%{background:#ff9900}40%{background:#c01010}70%{background:#d41515}}
@keyframes dangerPulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes bigShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-14px)}30%{transform:translateX(14px)}45%{transform:translateX(-10px)}60%{transform:translateX(10px)}75%{transform:translateX(-6px)}90%{transform:translateX(6px)}}

/* ══════════════════════════════════════════
   LOBBY  — 60% orange bg, 30% white panels,
            10% red on key actions only
══════════════════════════════════════════ */
#screen-lobby{
  flex:1;display:flex;flex-direction:column;
  background:var(--c60);padding:0;overflow:hidden;
  animation:fadeIn .25s ease;
}

/* Top: 60% orange — brand headline */
.lb-top{
  flex:0 0 auto;padding:clamp(14px,4vw,24px) clamp(16px,5vw,28px) 0;
  position:relative;
}
.lb-eyebrow{
  font-size:clamp(9px,2.5vw,12px);font-weight:700;letter-spacing:.12em;
  color:rgba(255,255,255,.75);font-family:var(--H2);margin-bottom:2px;
}
.lb-title{
  font-size:clamp(38px,12vw,56px);font-weight:900;color:var(--c30);
  line-height:.88;text-shadow:0 4px 0 rgba(0,0,0,.18);
}
/* 10% red — the WORD CATCHER sub-banner */
.lb-subbanner{
  display:inline-flex;align-items:center;background:var(--c10);
  border-radius:4px;padding:4px 14px;margin-top:8px;
  box-shadow:2px 2px 0 rgba(0,0,0,.2);
}
.lb-subbanner span{
  font-size:clamp(10px,3vw,14px);font-weight:900;color:var(--c30);letter-spacing:.12em;
}

/* 30% white — stats band */
.lb-stats{
  flex:0 0 auto;
  background:var(--c30);                /* white surface — 30% */
  margin:clamp(12px,3vw,20px) clamp(14px,4vw,24px) 0;
  border-radius:16px;
  padding:clamp(10px,2.5vw,16px) clamp(8px,2vw,12px);
  display:flex;justify-content:space-around;align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.stat-item{flex:1;text-align:center;}
.stat-icon-wrap{position:relative;width:clamp(48px,13vw,64px);height:clamp(48px,13vw,64px);margin:0 auto 6px;}
.stat-icon-wrap img{width:100%;height:100%;display:block;}
.stat-badge{
  position:absolute;top:-4px;right:-4px;
  border-radius:10px;padding:2px 6px;font-size:9px;font-weight:700;
  font-family:var(--H2);line-height:14px;white-space:nowrap;
}
.stat-value{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--c30);border-radius:20px;
  padding:1px 8px;font-size:11px;font-weight:900;white-space:nowrap;
  font-family:var(--H1);
}
.stat-label{
  font-size:clamp(7px,1.8vw,9px);font-weight:700;color:var(--ink2);
  white-space:pre-line;line-height:1.35;font-family:var(--H2);margin-top:14px;
  text-transform:uppercase;letter-spacing:.04em;
}

/* 10% red — match day ribbon */
.lb-matchday{
  flex:0 0 auto;
  background:var(--c10);               /* red — accent 10% */
  margin:clamp(10px,2.5vw,16px) clamp(14px,4vw,24px) 0;
  border-radius:12px;padding:10px 16px;
  display:flex;align-items:center;gap:10px;
}
.lb-matchday-title{font-size:clamp(10px,2.8vw,13px);font-weight:700;color:var(--c30);font-family:var(--H2);}
.lb-matchday-sub{font-size:clamp(8px,2.2vw,10px);color:rgba(255,255,255,.8);font-family:var(--H2);font-weight:300;}

/* spacer — orange shows through (60%) */
.lb-spacer{flex:1;}

/* 10% red CTA button */
.lb-cta{
  flex:0 0 auto;
  padding:clamp(10px,3vw,18px) clamp(14px,4vw,24px) clamp(16px,4vw,28px);
}
.btn-kickoff{
  width:100%;background:var(--c10);color:var(--c30);  /* 10% red */
  border:none;border-radius:30px;
  padding:clamp(14px,4vw,18px);
  font-size:clamp(16px,4.5vw,20px);font-weight:900;cursor:pointer;
  box-shadow:0 5px 0 var(--c10d),0 8px 20px rgba(236,35,38,.35);
  letter-spacing:.04em;font-family:var(--H1);
  transition:transform .1s,box-shadow .1s;
}
.btn-kickoff:active{transform:translateY(3px);box-shadow:0 2px 0 var(--c10d);}
.cta-note{text-align:center;font-size:10px;color:rgba(255,255,255,.55);margin-top:8px;font-family:var(--H2);}

/* ══════════════════════════════════════════
   GAME  — 60% orange field, 30% white HUD,
           10% red score/lives accent
══════════════════════════════════════════ */
#screen-game{
  flex:1;display:flex;flex-direction:column;
  background:var(--c60);overflow:hidden;
  animation:fadeIn .15s ease;
}

/* 30% white — top HUD bar */
.gm-hud{
  flex:0 0 auto;
  background:var(--c30);              /* white — 30% surface */
  padding:clamp(8px,2vw,12px) clamp(14px,4vw,22px);
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.gm-brand{display:flex;flex-direction:column;gap:3px;}
.gm-title{font-size:clamp(20px,6vw,28px);font-weight:900;color:var(--ink);line-height:1;}
/* 10% red accent tag */
.gm-tag{
  display:inline-flex;background:var(--c10);border-radius:4px;
  padding:2px 8px;width:fit-content;
}
.gm-tag span{font-size:clamp(8px,2vw,10px);font-weight:900;color:var(--c30);letter-spacing:.1em;}
.gm-hud-right{display:flex;flex-direction:column;align-items:center;gap:5px;}
/* score circle — yellow (from palette, acts as highlight within 30%) */
.score-circle{
  width:clamp(48px,13vw,60px);height:clamp(48px,13vw,60px);
  background:var(--yellow);border-radius:50%;
  border:3px solid rgba(255,255,255,.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.score-num{font-size:clamp(16px,5vw,22px);font-weight:900;color:var(--ink);line-height:1;}
.score-lbl{font-size:7px;font-weight:700;color:var(--ink);font-family:var(--H2);letter-spacing:.04em;}
.lives-wrap{position:relative;width:clamp(38px,10vw,48px);height:clamp(35px,9vw,44px);}
.lives-wrap img{width:100%;height:100%;display:block;}
/* 10% red badge on lives */
.lives-num{
  position:absolute;top:-3px;right:-5px;
  width:20px;height:20px;background:var(--c10);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:var(--c30);border:2px solid var(--c30);
  font-family:var(--H1);
}

/* 60% orange — category line */
.gm-cat-line{
  flex:0 0 auto;padding:5px clamp(14px,4vw,22px);
  display:flex;align-items:center;gap:8px;
}
.gm-cat-name{font-size:clamp(12px,3.5vw,16px);font-weight:900;color:rgba(255,255,255,.5);}
.combo-badge{background:var(--yellow);color:var(--ink);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:900;display:none;}
.lvl-badge{background:var(--c10);color:var(--c30);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:900;display:none;animation:lvlPop 1.4s ease;}

/* 60% orange — game field (dominant) */
#game-field{
  flex:1;position:relative;overflow:hidden;
  background:var(--c60);
}

/* words — good=green(clear), bad=red(10% echo) */
.falling-word{
  position:absolute;color:var(--c30);border-radius:8px;
  padding:clamp(4px,1.2vw,6px) clamp(10px,3vw,14px);
  font-size:clamp(12px,3.5vw,15px);font-weight:900;
  white-space:nowrap;letter-spacing:.04em;
  animation:wordIn .12s ease;
}
.word-good{background:rgba(20,130,55,.95);box-shadow:0 2px 8px rgba(20,130,55,.4);}
.word-bad{background:rgba(200,20,20,.92);box-shadow:0 2px 12px rgba(200,20,20,.6);border:1.5px solid rgba(255,100,100,.4);}
.word-bad.danger-close{background:rgba(180,0,0,.98);box-shadow:0 0 16px rgba(255,0,0,.8),0 0 30px rgba(255,0,0,.4);animation:dangerPulse .4s ease infinite;}
#screen-game.hit-flash{animation:screenFlash .4s ease;}
#cart-el.big-shake{animation:bigShake .5s ease;}
#danger-bar{position:absolute;bottom:0;left:0;right:0;height:0;background:#ec2326;transition:height .15s,opacity .15s;opacity:0;z-index:3;}
#dodge-hint{position:absolute;left:50%;transform:translateX(-50%);background:rgba(236,35,38,.92);color:#fff;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:900;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:8;}

.flash-msg{
  position:absolute;border-radius:20px;padding:4px 12px;
  font-size:clamp(11px,3vw,14px);font-weight:900;
  pointer-events:none;animation:floatUp 1.1s ease forwards;z-index:10;white-space:nowrap;
}
#cart-el{position:absolute;z-index:6;}
#cart-el img{display:block;}
#cart-el.shaking{animation:shake .5s ease;}


/* 30% white — button zone */
.gm-btns{
  flex:0 0 auto;
  background:var(--c30);             /* white — 30% */
  padding:clamp(10px,2.5vw,16px) clamp(16px,5vw,28px);
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
/* 10% red — action buttons */
.btn-arrow{
  width:clamp(60px,16vw,76px);height:clamp(60px,16vw,76px);
  border-radius:50%;background:var(--c10);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(22px,6vw,30px);color:var(--c30);
  box-shadow:0 4px 0 var(--c10d),0 6px 18px rgba(236,35,38,.35);
  touch-action:none;transition:transform .08s;
}
.btn-arrow:active{transform:scale(.93);}
.hud-center{text-align:center;}


/* ══════════════════════════════════════════
   RESULT — 60% orange, 30% white voucher,
            10% red accents
══════════════════════════════════════════ */
#screen-result{
  flex:1;display:flex;flex-direction:column;
  background:var(--c60);overflow-y:auto;
  animation:fadeIn .25s ease;
}
.rs-header{
  flex:0 0 auto;padding:clamp(14px,4vw,22px) clamp(16px,4vw,24px) 0;
}
.rs-brand{font-size:clamp(9px,2.5vw,11px);color:rgba(255,255,255,.7);font-family:var(--H2);letter-spacing:.1em;margin-bottom:2px;}
.rs-title{font-size:clamp(28px,9vw,42px);font-weight:900;color:var(--c30);line-height:.9;}
.rs-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,.8);font-family:var(--H2);font-weight:300;margin-top:6px;}

/* score summary — 30% white pills */
.rs-scores{
  flex:0 0 auto;display:flex;gap:10px;
  padding:clamp(10px,2.5vw,16px) clamp(16px,4vw,24px);
}
.rs-score-card{
  flex:1;background:var(--c30);border-radius:14px;    /* white 30% */
  padding:clamp(8px,2vw,12px) 6px;text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.rs-score-val{font-size:clamp(18px,5vw,24px);font-weight:900;color:var(--ink);}
.rs-score-lbl{font-size:clamp(7px,1.8vw,9px);color:var(--ink2);font-family:var(--H2);text-transform:uppercase;letter-spacing:.04em;}

/* voucher card — 30% white surface */
.voucher-card{
  flex:0 0 auto;
  background:var(--c30);             /* white — 30% */
  margin:0 clamp(14px,4vw,22px) clamp(10px,2.5vw,14px);
  border-radius:18px;padding:clamp(14px,3.5vw,20px);text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
}
.v-label{
  display:inline-block;border-radius:20px;
  padding:3px 14px;font-size:9px;font-weight:700;
  letter-spacing:.08em;margin-bottom:8px;color:var(--c30);font-family:var(--H2);
}
.v-disc-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
.v-disc{font-size:clamp(32px,10vw,46px);font-weight:900;color:var(--c10);line-height:1;}   /* 10% red */
.v-cat{font-size:clamp(11px,3vw,13px);font-weight:700;color:var(--ink);font-family:var(--H2);}
.v-code{
  background:#fff8e6;border:2px dashed var(--c60);border-radius:10px;
  padding:clamp(6px,1.5vw,10px) 18px;
  font-size:clamp(12px,3.5vw,16px);font-weight:900;color:var(--c60);
  letter-spacing:.14em;margin:10px auto 6px;display:inline-block;
  font-family:var(--H1);
}
.v-note{font-size:clamp(8px,2vw,10px);color:var(--ink2);font-family:var(--H2);}

/* progress — white surface */
.rs-progress{
  flex:0 0 auto;
  background:var(--c30);            /* white 30% */
  margin:0 clamp(14px,4vw,22px) clamp(10px,2.5vw,14px);
  border-radius:14px;padding:clamp(10px,2.5vw,14px) clamp(12px,3vw,16px);
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.rs-prog-title{font-size:clamp(8px,2.2vw,10px);font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-family:var(--H2);}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.prog-lbl{font-size:clamp(9px,2.5vw,11px);font-family:var(--H2);min-width:34px;font-weight:700;}
.prog-bg{flex:1;background:#f0ece4;border-radius:99px;height:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease;}

/* products */
.rs-products{
  flex:0 0 auto;
  background:var(--c30);            /* white 30% */
  margin:0 clamp(14px,4vw,22px) clamp(10px,2.5vw,14px);
  border-radius:14px;padding:clamp(10px,2.5vw,14px);
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.rs-prod-title{font-size:clamp(9px,2.5vw,11px);font-weight:700;color:var(--ink2);text-align:center;margin-bottom:8px;font-family:var(--H2);text-transform:uppercase;letter-spacing:.04em;}
.rs-prod-row{display:flex;gap:8px;}
.prod-card{flex:1;background:#fff8e6;border-radius:10px;padding:8px 6px;text-align:center;border:1px solid #f0e0b0;}
.prod-emoji{font-size:clamp(18px,5vw,24px);}
.prod-name{font-size:clamp(7px,1.8vw,9px);font-weight:700;color:var(--ink);line-height:1.2;margin:3px 0;font-family:var(--H2);}
.prod-disc{background:var(--c10);color:var(--c30);border-radius:20px;padding:2px 7px;font-size:clamp(8px,2.2vw,10px);font-weight:900;display:inline-block;}  /* 10% red */

/* spacer */
.rs-spacer{flex:1;min-height:clamp(8px,2vw,16px);}

/* result bottom — 10% red buttons */
.v-eyebrow{
  font-size:clamp(9px,2.5vw,11px);color:var(--ink2);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px;
}
.v-cat-line{
  font-size:clamp(10px,2.8vw,13px);color:var(--ink2);
  font-family:var(--H2);margin:4px 0 10px;
}
.v-code-row{
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;
}
.btn-copy{
  background:var(--c60);color:var(--c30);border:none;border-radius:8px;
  padding:6px 12px;font-size:11px;font-weight:900;cursor:pointer;
  font-family:var(--H1);letter-spacing:.06em;flex-shrink:0;
  transition:background .2s;
}
/* Main Jumia CTA block */
.rs-cta-block{
  flex:0 0 auto;
  padding:0 clamp(14px,4vw,22px) clamp(8px,2vw,12px);
}
.btn-jumia-main{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;background:var(--c10);color:var(--c30);
  border:none;border-radius:16px;
  padding:clamp(16px,4vw,20px) clamp(14px,3.5vw,20px);
  font-size:clamp(13px,3.6vw,16px);font-weight:900;
  cursor:pointer;text-decoration:none;
  box-shadow:0 6px 0 var(--c10d),0 8px 24px rgba(236,35,38,.35);
  font-family:var(--H1);letter-spacing:.04em;
  transition:transform .1s,box-shadow .1s;
}
.btn-jumia-main:active{transform:translateY(4px);box-shadow:0 2px 0 var(--c10d);}
.btn-jumia-main span{line-height:1.2;}
.rs-url-hint{
  text-align:center;font-size:clamp(8px,2vw,10px);
  color:rgba(255,255,255,.5);font-family:var(--H2);
  margin-top:6px;word-break:break-all;
}
/* Replay bar */
.rs-replay-bar{
  flex:0 0 auto;
  padding:clamp(8px,2vw,12px) clamp(14px,4vw,22px) clamp(14px,4vw,22px);
  background:var(--c30);
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.btn-replay-full{
  display:block;width:100%;background:transparent;
  color:var(--ink2);border:1.5px solid #ddd;border-radius:30px;
  padding:clamp(10px,2.5vw,13px);
  font-size:clamp(12px,3.2vw,14px);font-weight:700;cursor:pointer;
  font-family:var(--H2);transition:border-color .15s,color .15s;
}
.btn-replay-full:hover{border-color:var(--c60);color:var(--c60);}
.rs-no-attempts{
  text-align:center;font-size:clamp(10px,2.8vw,12px);
  color:var(--ink2);font-family:var(--H2);padding:8px 0;
}

/* ══════════════════════════════════════════

/* score mini strip inside form */
.fm-score-strip{

/* submit button — 10% red */

<body>
<div id="app"></div>
<script>
// ── CONFIG
const H1="'HelveticaDisplay','Gotham','Arial Black',Arial,sans-serif";
const H2="'HelveticaText','Gotham',Arial,sans-serif";
const O="var(--c60)",Y="var(--yellow)",D="var(--ink)",R="var(--c10)",GR="var(--green)";

// Game dimensions — dynamic
function getFW(){ return document.getElementById('app').offsetWidth||window.innerWidth||390; }
function getFH(){ return document.getElementById('game-field')?.offsetHeight||320; }
const CW=88,CH=44,CART_SPD=7;
function CATCH_Y(fh){ return fh-CH-4; }

const IMG_CART    ="https://raw.githubusercontent.com/Madzack69/Icons/main/Cart_Lala_l3ziza.png";

const IMG_ATTEMPTS="https://raw.githubusercontent.com/Madzack69/Icons/main/Attempts.png";

const CATS=[
  {id:"electronique",icon:"📺",name:"Électronique",sub:"TV & Son",
   good:["ÉCRAN","SON","TV","WIFI","HD","CÂBLE","AMPLI","DÉCO","IMAGE","SMART"],
   bad:["HORS-JEU","CARTON","FAUTE","CORNER","ARBITRE","RATÉ"],
   products:[{emoji:"📺",name:'Samsung 55"',disc:"-22%"},{emoji:"🔊",name:"JBL Party Box",disc:"-18%"},{emoji:"📡",name:"Décodeur HD",disc:"-30%"}]},
  {id:"sport",icon:"⚽",name:"Sport",sub:"Kits & Équipement",
   good:["BUT","DRIBBLE","SPRINT","VICTOIRE","PASSE","FRAPPE","STADE","ÉQUIPE","ATTAQUE","GARDIEN"],
   bad:["HORS-JEU","BLESSURE","RATÉ","SIFFLET","PENALTY","CARTON"],
   products:[{emoji:"⚽",name:"Ballon Officiel",disc:"-25%"},{emoji:"👟",name:"Crampons",disc:"-20%"},{emoji:"🧤",name:"Gants Gardien",disc:"-15%"}]},
  {id:"mode",icon:"👕",name:"Mode",sub:"Maillots & Tenues",
   good:["MAILLOT","KIT","ÉCHARPE","CASQUETTE","BADGE","TENUE","FAN","STYLE","COULEURS","ÉQUIPE"],
   bad:["HORS-JEU","CARTON","FAUTE","ARBITRE","RATÉ","PENALTY"],
   products:[{emoji:"👕",name:"Maillot Officiel",disc:"-20%"},{emoji:"🧣",name:"Écharpe Fan",disc:"-15%"},{emoji:"🧢",name:"Casquette Équipe",disc:"-18%"}]},
  {id:"alimentation",icon:"🍕",name:"Alimentation",sub:"Snacks & Boissons",
   good:["FESTIN","SNACK","GRILLADES","BOISSON","FÊTE","CHIPS","APÉRO","PIZZA","AMIS","SOIRÉE"],
   bad:["HORS-JEU","CARTON","FAUTE","CORNER","RATÉ","SIFFLET"],
   products:[{emoji:"🍕",name:"Box Apéro",disc:"-12%"},{emoji:"🥤",name:"Pack Boissons x24",disc:"-20%"},{emoji:"🔥",name:"Kit Barbecue",disc:"-25%"}]},
];

function getVoucher(s){
  if(s>=800) return{disc:"20% DE RÉD.",code:"JMLEGENDE20",label:"🏆 LÉGENDE",bg:"#ec2326"};
  if(s>=400) return{disc:"15% DE RÉD.",code:"JMCHAMP15",label:"⭐ CHAMPION",bg:"#633185"};
  if(s>=150) return{disc:"10% DE RÉD.",code:"JMMATCH10",label:"🔥 MATCH READY",bg:"#ff9900"};
  return          {disc:"5% DE RÉD.", code:"JMSTART5",label:"👟 DÉBUTANT",bg:"#403b3b"};
}

// ── STATE
let selCatIdx=0,attempts=4,vWon=0,totalPts=0;
let wordsArr=[],cartXVal=200,livesVal=3,scoreVal=0,comboVal=0,speedVal=1.1,elapsedSec=0;
let pressDir=null,done=false,animId=null,lastT=null,lastSpawn=0,spawnInt=2000;
let wonCatIdx=0,wid=0,playerName='',playerEmail='',playerCity='';

function $(id){return document.getElementById(id);}

function spawnWord(cat,speed){
  const isGood=Math.random()<0.28; // 28% good (bonus), 72% bad (dodge)
  const pool=isGood?cat.good:cat.bad;
  const text=pool[Math.floor(Math.random()*pool.length)];
  const fw=getFW(); const w=text.length*9+28;
  return{id:wid++,text,isGood,x:Math.random()*Math.max(8,fw-w-14)+4,y:-34,speed,width:w};
}

// ── LOBBY
function renderLobby(){
  $('app').innerHTML=`
  <div id="screen-lobby">
    <div class="lb-top">
      <div class="lb-eyebrow">JUMIA PRÉSENTE</div>
      <div class="lb-title">ATTRAPE<br>LES MOTS</div>
      <div class="lb-subbanner"><span>ATTRAPE-MOTS ⚽</span></div>
    </div>

    <div class="lb-stats">
      ${[{icon:IMG_ATTEMPTS,val:`${attempts}/4`,lbl:"TENTATIVES\nAUJOURD'HUI",badge:"GO",bc:"#22a651",tc:"#fff"},
         {icon:IMG_TROPHY,  val:vWon,           lbl:"BONS\nGAGNÉS",          badge:"🎟",bc:"#ffba00",tc:"#403b3b"},
         {icon:IMG_STAR,    val:totalPts,        lbl:"POINTS\nTOTAL",         badge:"⭐",bc:"#ffba00",tc:"#403b3b"}
      ].map(s=>`
        <div class="stat-item">

    </div>

        <div class="lb-matchday-sub">Esquive les mots rouges · Attrape les bonus ⭐</div>

    <div class="lb-cta">

        ?`<div style="background:rgba(0,0,0,.25);border-radius:30px;padding:16px;text-align:center;color:rgba(255,255,255,.65);font-size:13px;font-family:${H2}">⏳ Plus de tentatives aujourd'hui. Reviens demain !</div>`
        :`<button class="btn-kickoff" id="btn-start">⚽ COUP D'ENVOI !</button>`}

  const bs=$('btn-start');
  if(bs) bs.addEventListener('pointerdown',()=>renderForm());
}

// ── GAME SCREEN
function renderGame(){
  const cat=CATS[selCatIdx];
  $('app').innerHTML=`
  <div id="screen-game">
    <div class="gm-hud">
      <div class="gm-brand">
        <div class="gm-title">ATTRAPE-MOTS</div>
        <div class="gm-tag"><span>WORD CATCHER</span></div>
      </div>
      <div class="gm-hud-right">
        <div class="score-circle">
          <div class="score-num" id="score-disp">0</div>
          <div class="score-lbl">POINTS</div>
        </div>
        <div class="lives-wrap">
          <img src="${IMG_LIFE}" alt="">
          <div class="lives-num" id="lives-disp">3</div>
        </div>
      </div>
    </div>

    <div class="gm-cat-line">
      <div class="gm-cat-name">${cat.icon} ${cat.name}</div>
      <div class="combo-badge" id="combo-badge"></div>
    </div>

    <div id="game-field">
      <div id="cart-el">
        <img src="${IMG_CART}" style="width:${CW}px;height:${CH}px">
      </div>
      <div id="danger-bar"></div>
      <div id="dodge-hint">⚠ ESQUIVE !</div>
    </div>

    <div class="gm-btns" style="justify-content:space-around">
      <button class="btn-arrow" id="btn-left" style="width:clamp(72px,18vw,90px);height:clamp(72px,18vw,90px);font-size:clamp(26px,7vw,34px)">&#9664;</button>
      <button class="btn-arrow" id="btn-right" style="width:clamp(72px,18vw,90px);height:clamp(72px,18vw,90px);font-size:clamp(26px,7vw,34px)">&#9654;</button>
    </div>
  </div>`;

  // position cart after render
  const fw=getFW(); cartXVal=fw/2;
  const ce=$('cart-el');
  if(ce){ce.style.left=(cartXVal-CW/2)+'px';ce.style.top=CATCH_Y(getFH())+'px';}

  const bl=$('btn-left'),br=$('btn-right');
  const onL=()=>{pressDir='l'},onR=()=>{pressDir='r'},off=()=>{pressDir=null};
  bl.addEventListener('pointerdown',onL);bl.addEventListener('pointerup',off);bl.addEventListener('pointerleave',off);
  br.addEventListener('pointerdown',onR);br.addEventListener('pointerup',off);br.addEventListener('pointerleave',off);
}

// ── START GAME
function startGame(cat){
  selCatIdx=CATS.indexOf(cat);
  done=false;wid=0;wordsArr=[];
  livesVal=3;scoreVal=0;comboVal=0;speedVal=1.1;elapsedSec=0;
  lastT=null;lastSpawn=0;spawnInt=2000;pressDir=null;
  renderGame();
  const fw=getFW(); cartXVal=fw/2;
  animId=requestAnimationFrame(tick);
}

// ── GAME LOOP
function tick(ts){
  if(done)return;
  if(!lastT)lastT=ts;
  const dt=Math.min((ts-lastT)/16,3);lastT=ts;
  const cat=CATS[selCatIdx];
  const fw=getFW(),fh=getFH(),cy=CATCH_Y(fh);

  // Smooth time-based acceleration — no levels
  elapsedSec+=dt/60;
  speedVal=Math.min(5.8, 1.1 + elapsedSec*0.038);
  spawnInt=Math.max(560, 2100 - elapsedSec*22);

  // Cart speed also scales with time for responsiveness
  const spd=CART_SPD+(elapsedSec*0.08);
  if(pressDir==='l')cartXVal=Math.max(CW/2,cartXVal-spd*dt);
  if(pressDir==='r')cartXVal=Math.min(fw-CW/2,cartXVal+spd*dt);
  const ce=$('cart-el');if(ce)ce.style.left=(cartXVal-CW/2)+'px';

  // Spawn — can spawn 2 at once at high levels for chaos
  if(ts-lastSpawn>spawnInt){
    const w=spawnWord(cat,speedVal);
    wordsArr.push(w);lastSpawn=ts;
    addWordEl(w);
    // Double spawn after 30s for chaos
    if(elapsedSec>30&&Math.random()<0.40){
      setTimeout(()=>{
        if(done)return;
        const w2=spawnWord(cat,speedVal*0.88);
        wordsArr.push(w2);addWordEl(w2);
      },300);
    }
  }

  let livesLost=0,ptsGained=0,newCombo=comboVal;
  let closestBadDist=9999;

  wordsArr=wordsArr.filter(w=>{
    w.y+=w.speed*dt;
    const el=$('w-'+w.id);if(el)el.style.top=w.y+'px';
    const cx=w.x+w.width/2;
    const inCart=cx>=cartXVal-CW/2&&cx<=cartXVal+CW/2;

    // Track closest BAD word to cart for danger indicator
    if(!w.isGood){
      const distY=cy-w.y;
      if(distY>0&&distY<closestBadDist)closestBadDist=distY;
      // Highlight as danger when close
      if(distY<100&&el)el.classList.add('danger-close');
      else if(el)el.classList.remove('danger-close');
    }

    if(w.y+20>=cy&&w.y<cy+CH){
      if(inCart){
        if(w.isGood){
          // BONUS catch — good word
          newCombo++;
          const pts=Math.round((80+Math.floor(elapsedSec)*3)*Math.min(newCombo,5)*2);
          ptsGained+=pts;
          showFlash(Math.min(Math.max(cx-30,0),fw-80),cy-40,'+'+pts+' BONUS!',true);
        }else{
          // BAD word hits cart — lose life + big feedback
          newCombo=0;livesLost++;
          showFlash(Math.min(Math.max(cx-40,0),fw-100),cy-50,'💥 TOUCHÉ!',false);
          // Screen flash red
          const sg=$('screen-game');
          if(sg){sg.classList.add('hit-flash');setTimeout(()=>sg&&sg.classList.remove('hit-flash'),400);}
          // Big shake on cart
          if(ce){ce.classList.remove('shaking');void ce.offsetWidth;ce.classList.add('big-shake');setTimeout(()=>ce&&ce.classList.remove('big-shake'),500);}
        }
        if(el)el.remove();return false;
      }
    }

    // Word exits bottom — bad word missing is GOOD (dodged!)
    if(w.y>fh+10){
      if(w.isGood){
        // Missed a bonus — no penalty, just no points
      }
      // Dodging bad words = survival points
      if(!w.isGood){
        ptsGained+=Math.round(8+elapsedSec*0.4);
      }
      if(el)el.remove();return false;
    }
    return true;
  });

  // Danger bar — red glow at bottom when bad words are close
  const db=$('danger-bar');
  const dh=$('dodge-hint');
  if(db){
    if(closestBadDist<120){
      const intensity=Math.max(0,(120-closestBadDist)/120);
      db.style.height=(intensity*8)+'px';
      db.style.opacity=intensity;
      if(dh){dh.style.top=(cy-45-(intensity*12))+'px';dh.style.opacity=closestBadDist<60?'1':'0';}
    }else{
      db.style.height='0';db.style.opacity='0';
      if(dh)dh.style.opacity='0';
    }
  }

  comboVal=newCombo;
  if(ptsGained){scoreVal+=ptsGained;const sd=$('score-disp');if(sd)sd.textContent=scoreVal;}
  const cb=$('combo-badge');
  if(cb){cb.style.display=newCombo>1?'inline-block':'none';cb.textContent='×'+Math.min(newCombo,5);}

  if(livesLost){
    livesVal=Math.max(0,livesVal-livesLost);
    const ld=$('lives-disp');if(ld)ld.textContent=livesVal;
    if(livesVal<=0){endGame(scoreVal);return;}
  }
  animId=requestAnimationFrame(tick);
}

function addWordEl(w){
  const field=$('game-field');if(!field)return;
  const el=document.createElement('div');
  el.id='w-'+w.id;
  el.className='falling-word '+(w.isGood?'word-good':'word-bad');
  el.textContent=w.isGood?'⭐ '+w.text:w.text;
  el.style.left=w.x+'px';el.style.top=w.y+'px';
  field.appendChild(el);
}

function showFlash(x,y,text,good){
  const field=$('game-field');if(!field)return;
  const el=document.createElement('div');
  el.className='flash-msg';el.textContent=text;
  el.style.cssText=`left:${x}px;top:${y}px;background:${good?'#ffba00':'#ec2326'};color:${good?'#403b3b':'#fff'};font-family:${H1};`;
  field.appendChild(el);setTimeout(()=>el.remove(),1100);
}

function endGame(finalScore){
  if(done)return;done=true;
  cancelAnimationFrame(animId);
  wonCatIdx=selCatIdx;
  if(finalScore>=150)vWon++;
  totalPts+=finalScore;scoreVal=finalScore;
  attempts=Math.max(0,attempts-1);
  // Update Sheet with actual score (best effort, no-cors)
  if(SHEET_URL.startsWith("https://") && playerName){
    const sp = new URLSearchParams({
      action:  'update_score',
      email:   playerEmail,
      score:   finalScore,
      combo:   Math.min(comboVal,5),
      survie:  Math.floor(elapsedSec),
      voucher: getVoucher(finalScore).code
    });
    fetch(SHEET_URL + '?' + sp.toString(), {
      method: 'GET', redirect: 'follow'
    }).catch(()=>{});
  }
  renderResult();
}

    </div>

    <div class="fm-legal">
      En soumettant ce formulaire, tu acceptes d'être contacté(e)<br>
      par Jumia. Tes données restent confidentielles.
    </div>

  </div>`;

  $('btn-submit').addEventListener('click', submitForm);
  // Allow Enter key on last field
  $('inp-city').addEventListener('keydown', e=>{ if(e.key==='Enter') submitForm(); });
}

function submitForm(){
  const name  = $('inp-name')?.value.trim();
  const email = $('inp-email')?.value.trim();
  const city  = $('inp-city')?.value.trim();
  // Store globally for score update after game
  playerName=name; playerEmail=email; playerCity=city;
  let valid=true;

  // Validate
  const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  [['inp-name','err-name',!name],
   ['inp-email','err-email',!emailRe.test(email)],
   ['inp-city','err-city',!city]
  ].forEach(([inp,err,fail])=>{
    $(inp)?.classList.toggle('error',fail);
    const em=$(err); if(em)em.classList.toggle('visible',fail);
    if(fail)valid=false;
  });
  if(!valid)return;

  // Loading state
  const btn=$('btn-submit');
  const lbl=$('submit-label');
  const spn=$('submit-spinner');
  if(btn)btn.disabled=true;
  if(lbl)lbl.style.display='none';
  if(spn)spn.style.display='block';

  const payload={
    timestamp: new Date().toISOString(),
    name, email, city,
    score:scoreVal,
    combo:Math.min(comboVal,5),
    survie:Math.floor(elapsedSec),
    voucher:getVoucher(scoreVal).code,
    source:'JumiaAttrape-Mots'
  };

  // Send to Google Sheets via GET (most reliable with Apps Script)
  const params = new URLSearchParams({
    timestamp: payload.timestamp,
    name:      payload.name,
    email:     payload.email,
    city:      payload.city,
    score:     payload.score,
    combo:     payload.combo,
    survie:    payload.survie,
    voucher:   payload.voucher,
    source:    payload.source
  });

  fetch(SHEET_URL + '?' + params.toString(), {
    method: 'GET',
    redirect: 'follow'
  })
  .then(()=>startGame(CATS[selCatIdx]))
  .catch(()=>startGame(CATS[selCatIdx]));
}

</script>
